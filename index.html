<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#4b2e83" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MyMap" />
  <title>MyMap</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.7.1/dist/maplibre-gl.css" />
  <style>
    /* Critical MapLibre layout rules are included locally. The actual map is
       drawn in one WebGL canvas, so separate image tiles cannot drift apart. */
    .maplibregl-map { position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    .maplibregl-canvas-container, .maplibregl-canvas { position: absolute; left: 0; top: 0; }
    .maplibregl-canvas { outline: none; }
    .maplibregl-control-container { position: absolute; inset: 0; pointer-events: none; }
    .maplibregl-ctrl-top-left, .maplibregl-ctrl-top-right,
    .maplibregl-ctrl-bottom-left, .maplibregl-ctrl-bottom-right { position: absolute; pointer-events: none; z-index: 2; }
    .maplibregl-ctrl-top-left { top: calc(132px + var(--safe-top)); left: 10px; }
    .maplibregl-ctrl-top-right { top: 0; right: 0; }
    .maplibregl-ctrl-bottom-left { bottom: 0; left: 0; }
    .maplibregl-ctrl-bottom-right { right: 0; bottom: 0; }
    .maplibregl-ctrl { clear: both; pointer-events: auto; transform: translate(0,0); }
    .maplibregl-marker { position: absolute; top: 0; left: 0; will-change: transform; }
    .maplibregl-popup { position: absolute; top: 0; left: 0; display: flex; will-change: transform; pointer-events: none; }
    .maplibregl-popup-content { position: relative; pointer-events: auto; background: white; border-radius: 16px; box-shadow: var(--shadow); padding: 11px 13px; min-width: 150px; }

    :root {
      --purple: #4b2e83;
      --purple-2: #6b4aa0;
      --gold: #b7a57a;
      --gold-soft: #f3ead1;
      --ink: #241f2e;
      --muted: #726b7d;
      --paper: #ffffff;
      --bg: #f6f3fb;
      --danger: #b42318;
      --success: #247a4a;
      --shadow: 0 10px 28px rgba(36, 31, 46, 0.16);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; min-height: 100%; margin: 0; overflow: hidden; }
    @supports (height: 100dvh) {
      html, body { height: 100dvh; }
    }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
    }
    button, input, textarea, select { font: inherit; }
    button { touch-action: manipulation; }

    #app { position: fixed; inset: 0; width: 100%; height: 100%; min-height: 100%; overflow: hidden; }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; min-height: 100%; background: #dfe8e3; }

    .topbar {
      position: absolute;
      z-index: 900;
      top: calc(10px + var(--safe-top));
      left: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      pointer-events: none;
    }
    .brand {
      width: 64px;
      height: 64px;
      flex: 0 0 64px;
      padding: 7px 5px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(75, 46, 131, 0.96);
      color: white;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 16px;
      box-shadow: var(--shadow);
      pointer-events: auto;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 0;
      line-height: .95;
    }
    .brand small {
      display: block;
      width: 100%;
      margin-top: 6px;
      font-size: 8px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      opacity: .88;
      letter-spacing: .08em;
    }

    .search-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border-radius: 16px;
      background: rgba(255,255,255,.96);
      box-shadow: var(--shadow);
      border: 1px solid rgba(75,46,131,.12);
      pointer-events: auto;
    }
    #searchInput {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      padding: 8px 5px;
      color: var(--ink);
      background: transparent;
    }
    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 13px;
      background: #f0eaf8;
      color: var(--purple);
      font-size: 20px;
      font-weight: 900;
    }
    .icon-btn:active { transform: scale(.96); }
    .icon-btn.listening { background: #dc3545; color: #ffffff; }

    .jump-strip {
      position: absolute;
      z-index: 880;
      top: calc(84px + var(--safe-top));
      left: 10px;
      right: 10px;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 2px 2px 7px;
      scrollbar-width: none;
      pointer-events: auto;
    }
    .jump-strip::-webkit-scrollbar { display: none; }
    .jump-chip {
      flex: 0 0 auto;
      min-height: 36px;
      border: 1px solid rgba(75,46,131,.16);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(255,255,255,.96);
      color: var(--purple);
      box-shadow: 0 4px 12px rgba(36,31,46,.13);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .jump-chip:active { transform: scale(.97); }

    .map-tip {
      position: absolute;
      z-index: 750;
      top: calc(180px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      max-width: calc(100% - 30px);
      background: rgba(36,31,46,.92);
      color: white;
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 750;
      box-shadow: 0 5px 18px rgba(0,0,0,.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      text-align: center;
    }
    .map-tip.show { opacity: 1; transform: translate(-50%, 3px); }

    .bottom-nav {
      position: absolute;
      z-index: 900;
      left: 10px;
      right: 10px;
      bottom: calc(10px + var(--safe-bottom));
      height: 68px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      padding: 6px;
      border-radius: 22px;
      background: rgba(255,255,255,.97);
      box-shadow: var(--shadow);
      border: 1px solid rgba(75,46,131,.12);
    }
    .nav-btn {
      position: relative;
      height: 54px;
      border: 0;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2px;
      font-weight: 800;
      font-size: 10px;
    }
    .nav-btn span:first-child { font-size: 22px; line-height: 1; }
    .nav-btn.active { background: #f0eaf8; color: var(--purple); }
    .nav-btn.add {
      width: 58px;
      height: 58px;
      justify-self: center;
      margin-top: -28px;
      border-radius: 50%;
      background: var(--purple);
      color: white;
      border: 4px solid white;
      box-shadow: 0 8px 20px rgba(75,46,131,.36);
    }
    .nav-btn.add span:first-child { font-size: 28px; }

    .sheet-backdrop {
      position: absolute;
      z-index: 1000;
      inset: 0;
      background: rgba(30,24,40,.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .sheet-backdrop.show { opacity: 1; pointer-events: auto; }

    .sheet {
      position: absolute;
      z-index: 1010;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: min(84vh, 760px);
      border-radius: 26px 26px 0 0;
      background: var(--paper);
      box-shadow: 0 -16px 40px rgba(36,31,46,.2);
      transform: translateY(105%);
      transition: transform .25s ease;
      padding: 10px 16px calc(18px + var(--safe-bottom));
      overflow: auto;
      overscroll-behavior: contain;
    }
    .sheet.show { transform: translateY(0); }
    .handle { width: 46px; height: 5px; margin: 0 auto 10px; border-radius: 99px; background: #d8d2df; }
    .sheet-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .sheet-head h2 { margin: 0; font-size: 22px; flex: 1; }
    .close-btn { border: 0; background: #eeeaf2; border-radius: 50%; width: 40px; height: 40px; font-size: 22px; }

    .field { margin: 12px 0; }
    .field label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 850; color: #554d60; }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid #dcd5e4;
      border-radius: 14px;
      padding: 12px 13px;
      outline: 0;
      background: #fcfbfd;
      color: var(--ink);
    }
    .field textarea { resize: vertical; min-height: 94px; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--purple-2); box-shadow: 0 0 0 3px rgba(75,46,131,.1); }

    .switch-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .switch-card { display: flex; align-items: center; gap: 9px; padding: 11px; border-radius: 14px; background: #f8f5fb; font-weight: 750; font-size: 13px; }
    .switch-card input { width: 20px; height: 20px; accent-color: var(--purple); }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 16px; }
    .actions.one { grid-template-columns: 1fr; }
    .btn {
      min-height: 48px;
      padding: 10px 14px;
      border: 0;
      border-radius: 14px;
      font-weight: 900;
      background: #eeeaf2;
      color: var(--ink);
    }
    .btn.primary { background: var(--purple); color: white; }
    .btn.gold { background: var(--gold-soft); color: #5c4a1f; }
    .btn.danger { background: #fde9e7; color: var(--danger); }
    .btn.success { background: #e6f5eb; color: var(--success); }
    .btn:active { transform: scale(.985); }

    .category-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 9px;
      scrollbar-width: none;
    }
    .category-strip::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      border: 1px solid #ded6e7;
      border-radius: 999px;
      padding: 9px 12px;
      background: white;
      font-weight: 800;
      color: #5e5669;
    }
    .chip.active { background: var(--purple); color: white; border-color: var(--purple); }

    .pin-list { display: grid; gap: 9px; padding-bottom: 4px; }
    .pin-card {
      display: grid;
      grid-template-columns: 45px 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid #e5dfeb;
      border-radius: 17px;
      background: #fff;
      padding: 10px;
      text-align: left;
    }
    .pin-card .emoji { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 14px; font-size: 23px; background: #f4eff9; }
    .pin-card h3 { margin: 0 0 3px; font-size: 15px; }
    .pin-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .pin-card .distance { font-weight: 900; color: var(--purple); font-size: 12px; white-space: nowrap; }
    .empty { padding: 32px 14px; text-align: center; color: var(--muted); }
    .empty .big { font-size: 42px; display: block; margin-bottom: 8px; }

    .place-title { display: flex; gap: 12px; align-items: center; }
    .place-title .big-emoji { width: 54px; height: 54px; border-radius: 17px; background: #f1ebf7; display: grid; place-items: center; font-size: 30px; }
    .place-title h2 { margin: 0 0 3px; }
    .place-title p { margin: 0; color: var(--muted); font-size: 13px; }
    .place-note { margin: 14px 0; padding: 13px; background: #f8f5fb; border-radius: 14px; white-space: pre-wrap; line-height: 1.45; }
    .stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin: 12px 0; }
    .stat { padding: 11px; border: 1px solid #e5dfeb; border-radius: 14px; }
    .stat strong { display: block; font-size: 15px; color: var(--purple); }
    .stat small { color: var(--muted); }

    .search-results { display: grid; gap: 8px; margin-top: 10px; }
    .search-result { border: 1px solid #e3dce9; border-radius: 14px; padding: 11px; background: white; text-align: left; }
    .search-result strong { display: block; margin-bottom: 3px; }
    .search-result small { color: var(--muted); line-height: 1.35; }
    .time-row { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr) minmax(0,1.15fr); gap: 8px; width: 100%; }
    .time-row select { width: 100%; min-width: 0; padding-left: 8px; padding-right: 8px; }

    .menu-list { display: grid; gap: 9px; }
    .menu-item { width: 100%; padding: 13px; border-radius: 14px; border: 1px solid #e3dce9; background: white; text-align: left; font-weight: 800; }
    .fine-print { font-size: 12px; color: var(--muted); line-height: 1.45; }

    .quick-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin:10px 0 15px; }
    .quick-card { min-height:82px; padding:12px 9px; border:1px solid #e3dce9; border-radius:17px; background:#fff; text-align:center; font-weight:850; color:var(--ink); }
    .quick-card span { display:block; font-size:27px; margin-bottom:5px; }
    .next-card { padding:15px; border-radius:18px; background:linear-gradient(135deg,#4b2e83,#6b4aa0); color:white; margin:4px 0 14px; }
    .next-card h3 { margin:0 0 5px; font-size:18px; }
    .next-card p { margin:3px 0; opacity:.92; }
    .next-card .btn { margin-top:10px; background:white; color:var(--purple); }
    .event-card { border:1px solid #e4ddeb; border-radius:17px; padding:12px; margin:9px 0; background:white; }
    .event-card h3 { margin:0 0 4px; }
    .event-card p { margin:3px 0; color:var(--muted); font-size:13px; }
    .event-actions { display:flex; gap:7px; margin-top:9px; }
    .event-actions .btn { padding:9px; min-height:40px; }
    .day-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
    .day-check { border:1px solid #ddd4e5; border-radius:12px; padding:8px 4px; text-align:center; font-size:12px; }
    .day-check input { display:block; margin:0 auto 4px; }
    .segmented { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:5px; border-radius:14px; background:#f1ebf7; margin:10px 0; }
    .segmented button { border:0; border-radius:11px; padding:10px; font-weight:850; background:transparent; color:var(--purple); }
    .segmented button.active { background:white; box-shadow:0 2px 8px rgba(36,31,46,.12); }

    .toast {
      position: absolute;
      z-index: 1300;
      left: 50%;
      bottom: calc(94px + var(--safe-bottom));
      transform: translate(-50%, 20px);
      max-width: calc(100% - 30px);
      background: rgba(36,31,46,.95);
      color: white;
      padding: 10px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      text-align: center;
      font-size: 13px;
      font-weight: 750;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .maplibregl-ctrl-group { border-radius: 12px !important; overflow: hidden; box-shadow: var(--shadow) !important; }
    .maplibregl-ctrl-group button { width: 34px; height: 34px; border: 0; background-color: white; }
    .maplibregl-ctrl-bottom-right { margin-bottom: calc(84px + var(--safe-bottom)) !important; margin-right: 10px !important; }
    .maplibregl-ctrl-bottom-left { margin-bottom: calc(84px + var(--safe-bottom)) !important; margin-left: 10px !important; }
    .maplibregl-ctrl-attrib { font-size: 8px; padding: 1px 4px; background: rgba(255,255,255,.55); }
    .maplibregl-ctrl-attrib a { color: #888; }
    #findPartnerBtn {
      position: fixed;
      right: 10px;
      bottom: calc(84px + var(--safe-bottom) + 92px);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid #ffffff;
      background: #a33b67;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: var(--shadow);
      z-index: 20;
      cursor: pointer;
    }
    #findPartnerBtn.following { background: #6e2a49; box-shadow: 0 0 0 6px rgba(163,59,103,.28), var(--shadow); }
    #findPartnerBtn:active { transform: scale(.94); }
    #followMeBtn {
      position: fixed;
      right: 10px;
      bottom: calc(84px + var(--safe-bottom) + 88px);
      width: 34px;
      height: 34px;
      box-sizing: border-box;
      border-radius: 50%;
      border: 3px solid var(--purple);
      background: #ffffff;
      color: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: var(--shadow);
      z-index: 20;
      cursor: pointer;
    }
    #followMeBtn.following { background: var(--purple); color: #ffffff; border-color: #ffffff; box-shadow: 0 8px 20px rgba(75,46,131,.36); }
    #followMeBtn:active { transform: scale(.94); }
    .follow-me-icon { position: relative; width: 15px; height: 15px; }
    .follow-me-ring { position: absolute; inset: 0; border: 1.5px solid currentColor; border-radius: 50%; box-sizing: border-box; }
    .follow-me-dot { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; margin: -3px 0 0 -3px; background: currentColor; border-radius: 50%; }
    @media (min-width: 780px) {
      #followMeBtn { bottom: calc(10px + 88px); }
    }
    @media (min-width: 780px) {
      #findPartnerBtn { bottom: calc(10px + 92px); }
    }
    .popup-title { font-weight: 900; margin-bottom: 4px; }
    .popup-meta { color: var(--muted); font-size: 12px; }

    .map-pin { background: transparent; border: 0; }
    .pin-bubble {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50% 50% 50% 10%;
      transform: rotate(-45deg);
      border: 3px solid white;
      box-shadow: 0 4px 11px rgba(36,31,46,.3);
      background: var(--purple);
    }
    .pin-bubble > span { transform: rotate(45deg); font-size: 21px; }
    .pin-bubble.favorite { background: #a33b67; }
    .pin-bubble.visited { background: #2d7a51; }
    .transit-marker { background: transparent; border: 0; }
    .search-pin-wrap { display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .search-pin-dot { width: 14px; height: 14px; border-radius: 50%; background: #0f7a6b; border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,.35); flex-shrink: 0; }
    .search-pin-label { background: rgba(255,255,255,.96); padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; color: #0f7a6b; box-shadow: 0 2px 6px rgba(0,0,0,.25); white-space: nowrap; max-width: 170px; overflow: hidden; text-overflow: ellipsis; }
    .transit-bubble { width: 30px; height: 30px; display: grid; place-items: center; border: 2px solid white; border-radius: 10px; box-shadow: 0 3px 9px rgba(0,0,0,.25); background: #206da8; font-size: 16px; }
    .user-dot { width: 22px; height: 22px; border-radius: 50%; background: #1877f2; border: 4px solid white; box-shadow: 0 0 0 8px rgba(24,119,242,.2), 0 3px 10px rgba(0,0,0,.25); }

    @media (min-width: 780px) {
      .topbar { left: 20px; right: auto; width: min(560px, calc(100% - 40px)); }
      .bottom-nav { left: 50%; right: auto; width: 520px; transform: translateX(-50%); }
      .sheet { left: auto; right: 18px; bottom: 96px; width: 430px; max-height: calc(100vh - 130px); border-radius: 24px; }
      .maplibregl-ctrl-bottom-right, .maplibregl-ctrl-bottom-left { margin-bottom: 10px !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map" aria-label="Interactive map"></div>

    <header class="topbar">
      <button class="brand" id="menuBtn" aria-label="Open app menu">MM<small>SEATTLE</small></button>
      <form class="search-wrap" id="searchForm">
        <input id="searchInput" type="search" autocomplete="off" enterkeyhint="search" placeholder="Search Seattle places…" aria-label="Search for a place" />
        <button class="icon-btn" type="button" id="searchMicBtn" aria-label="Search by voice">🎤</button>
        <button class="icon-btn" type="submit" aria-label="Search">⌕</button>
      </form>
    </header>

    <div class="jump-strip" id="jumpStrip" aria-label="Jump to a Seattle neighborhood">
      <button class="jump-chip" data-jump="uw">🎓 UW</button>
      <button class="jump-chip" data-jump="udistrict">U District</button>
      <button class="jump-chip" data-jump="wallingford">🏫 Wallingford</button>
    </div>

    <div class="map-tip" id="mapTip">Tap the map where you want the pin.</div>

    <nav class="bottom-nav" aria-label="Main controls">
      <button class="nav-btn" id="pinsBtn"><span>📍</span><span>Places</span></button>
      <button class="nav-btn" id="scheduleBtn"><span>📅</span><span>Schedule</span></button>
      <button class="nav-btn add" id="addBtn" aria-label="Add a place"><span>＋</span><span>Add</span></button>
      <button class="nav-btn" id="planBtn"><span>🧭</span><span>Plan</span></button>
      <button class="nav-btn" id="moreBtn"><span>☰</span><span>More</span></button>
    </nav>

    function buildingFeatures(items) {

    async function loadUwBuildingLabels() {
      let features = buildingFeatures(UW_BUILDING_FALLBACK);
      const query = `[out:json][timeout:18];(way["building"]["name"](47.642,-122.322,47.670,-122.286);relation["building"]["name"](47.642,-122.322,47.670,-122.286);node["building"]["name"](47.642,-122.322,47.670,-122.286););out center;`;
      const endpoints = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.kumi.systems/api/interpreter",
        "https://overpass.nchc.org.tw/api/interpreter"
      ];
      for (const endpoint of endpoints) {
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: "data=" + encodeURIComponent(query)
          });
          if (!response.ok) throw new Error("Building label request failed");
          const data = await response.json();
          const found = (data.elements || []).map(el => {
            const lat = el.lat ?? el.center?.lat;
            const lng = el.lon ?? el.center?.lon;
            const name = el.tags?.name;
            return name && Number.isFinite(lat) && Number.isFinite(lng) ? [name, lng, lat] : null;
          }).filter(Boolean);
          if (found.length) features = buildingFeatures(found);
          break;
        } catch (_) {}
      }

      const data = { type: "FeatureCollection", features };
      if (map.getSource("uw-buildings")) {
        map.getSource("uw-buildings").setData(data);
        return;
      }
      map.addSource("uw-buildings", { type: "geojson", data });

        id: "uw-building-labels",

        source: "uw-buildings",
        minzoom: 14,

          "text-color": "#2b2140",
          "text-halo-color": "rgba(255,255,255,0.96)",
          "text-halo-width": 1.8
        }
      });
    }

    function haversine(a, b) {
      const R = 6371000;
      const rad = d => d * Math.PI / 180;
      const dLat = rad(b.lat - a.lat);
      const dLng = rad(b.lng - a.lng);
      const q = Math.sin(dLat / 2) ** 2 + Math.cos(rad(a.lat)) * Math.cos(rad(b.lat)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(q), Math.sqrt(1 - q));
    }

    function distanceLabel(meters) {
      if (!Number.isFinite(meters)) return "Location needed";
      if (meters < 1000) return `${Math.round(meters / 10) * 10} m`;
      return `${(meters / 1609.344).toFixed(meters > 8046 ? 1 : 2)} mi`;
    }

    function walkEstimate(meters) {
      if (!Number.isFinite(meters)) return "Location needed";
      const minutes = Math.max(1, Math.round(meters / 80));
      return `about ${minutes} min`;

      const origin = userLocation;

      const address = place.address ? `<p>${esc(place.address)}</p>` : "";
      const note = place.notes ? `<div class="place-note">${esc(place.notes)}</div>` : '<div class="place-note" style="color:var(--muted)">No notes yet.</div>';
      openSheet(`

        <div class="stats">

            <button type="submit" class="btn primary">Save pin</button>

    function saveForm(form) {
      const data = new FormData(form);
      const title = String(data.get("title") || "").trim();

      const fields = {

      const wasEditing = Boolean(editingId);
      if (editingId) {
        const index = places.findIndex(p => p.id === editingId);

      } else {

        places.push({
          id: uid(),
          lat: pendingLatLng.lat,
          lng: pendingLatLng.lng,

    function updateAccuracyCircle(lat, lng, radiusMeters) {
      if (!map.loaded()) return;
      const steps = 48;
      const coords = [];
      const earth = 6378137;
      for (let i = 0; i <= steps; i++) {
        const angle = (i / steps) * Math.PI * 2;
        const dLat = (radiusMeters / earth) * Math.sin(angle);
        const dLng = (radiusMeters / (earth * Math.cos(lat * Math.PI / 180))) * Math.cos(angle);
        coords.push([lng + dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI]);
      }
      const data = { type: "Feature", geometry: { type: "Polygon", coordinates: [coords] } };
      if (map.getSource("user-accuracy")) {
        map.getSource("user-accuracy").setData(data);
      } else {
        map.addSource("user-accuracy", { type: "geojson", data });
        map.addLayer({ id: "user-accuracy-fill", type: "fill", source: "user-accuracy", paint: { "fill-color": "#1877f2", "fill-opacity": 0.08 } });
        map.addLayer({ id: "user-accuracy-line", type: "line", source: "user-accuracy", paint: { "line-color": "#1877f2", "line-width": 1 } });
      }
    }

    async function locateUser(center = true) {
      if (!navigator.geolocation) return toast("Location is not supported on this device.");
      toast("Finding your location…");
      navigator.geolocation.getCurrentPosition(position => {
        const { latitude, longitude, accuracy } = position.coords;
        userLocation = { lat: latitude, lng: longitude };
        if (userMarker) userMarker.remove();
        const userEl = document.createElement("div");
        userEl.innerHTML = '<div class="user-dot"></div>';
        userEl.title = "Your location";
        userMarker = new maplibregl.Marker({ element: userEl, anchor: "center" })
          .setLngLat([longitude, latitude])
          .addTo(map);
        updateAccuracyCircle(latitude, longitude, accuracy);
        if (center) setMapView(latitude, longitude, Math.max(map.getZoom(), 16));
        toast(`Location found${accuracy ? ` · about ${Math.round(accuracy)} m accuracy` : ""}.`);
        startLiveLocation();
      }, error => {
        const message = error.code === 1 ? "Location permission was denied." : "Could not find your location.";
        toast(message);
      }, { enableHighAccuracy: true, timeout: 12000, maximumAge: 20000 });
    }

    function startLiveLocation() {
      if (liveWatchId !== null || !navigator.geolocation) return;

      liveWatchId = navigator.geolocation.watchPosition(position => {
        const { latitude, longitude, accuracy } = position.coords;
        userLocation = { lat: latitude, lng: longitude };

        if (userMarker) {
          userMarker.setLngLat([longitude, latitude]);
        } else {
          const userEl = document.createElement("div");
          userEl.innerHTML = '<div class="user-dot"></div>';
          userEl.title = "Your location";
          userMarker = new maplibregl.Marker({ element: userEl, anchor: "center" }).setLngLat([longitude, latitude]).addTo(map);
        }

        updateAccuracyCircle(latitude, longitude, accuracy);
        updateFollowMeButtonVisibility();

        if (followMe) {
          map.easeTo({ center: [longitude, latitude], duration: 900 });
        }
      }, () => {}, { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 });
    }

    function visibleSearchBounds() {
      const b = map.getBounds();
      return {
        south: Math.max(47.45, b.getSouth()),

        north: Math.min(47.78, b.getNorth()),

      };

    function overpassSearchTerms(query) {
      const q = query.toLowerCase().trim();
      if (/^coffee$|coffee shop|cafe|café/.test(q)) return ['["amenity"="cafe"]','["shop"="coffee"]'];
      if (/restaurant|food|lunch|dinner/.test(q)) return ['["amenity"="restaurant"]','["amenity"="fast_food"]','["amenity"="cafe"]'];
      if (/grocery|groceries|supermarket/.test(q)) return ['["shop"="supermarket"]','["shop"="convenience"]'];
      const safe = q.replace(/[\\"\n\r]/g, "").slice(0, 50);
      return [`["name"~"${safe}",i]`,`["brand"~"${safe}",i]`,`["operator"~"${safe}",i]`];
    }

    async function searchNearbyBusinesses(query) {
      const b = visibleSearchBounds();
      const bbox = `${b.south},${b.west},${b.north},${b.east}`;
      const selectors = overpassSearchTerms(query);
      const parts = [];
      for (const selector of selectors) {
        parts.push(`node${selector}(${bbox});way${selector}(${bbox});relation${selector}(${bbox});`);
      }
      const overpassQuery = `[out:json][timeout:10];(${parts.join("")});out center tags 100;`;
      const endpoints = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.kumi.systems/api/interpreter",
        "https://overpass.nchc.org.tw/api/interpreter"
      ];
      for (const endpoint of endpoints) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 6000);
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: "data=" + encodeURIComponent(overpassQuery),
            signal: controller.signal
          });
          clearTimeout(timeoutId);
          if (!response.ok) throw new Error("Nearby search unavailable");
          const data = await response.json();
          const center = map.getCenter();
          return (data.elements || []).map(el => {
            const lat = el.lat ?? el.center?.lat;
            const lon = el.lon ?? el.center?.lon;
            const tags = el.tags || {};
            const name = tags.name || tags.brand || tags.operator;
            if (!name || !Number.isFinite(lat) || !Number.isFinite(lon)) return null;
            const detail = [tags["addr:housenumber"], tags["addr:street"], tags["addr:city"] || "Seattle"].filter(Boolean).join(" ");
            const distance = Math.hypot(lat - center.lat, (lon - center.lng) * 0.7);
            return { name, display_name: detail || `${name}, Seattle, Washington`, lat: String(lat), lon: String(lon), category: tags.amenity || tags.shop || "place", type: tags.amenity || tags.shop || "place", _distance: distance };
          }).filter(Boolean).sort((a,b)=>a._distance-b._distance).slice(0,60);
        } catch (_) {}
      }
      return [];
    }

    async function searchPlaces(query) {
      const q = query.trim();
      if (q.length < 2) return toast("Type at least two letters.");
      const now = Date.now();
      if (now - lastSearchAt < 900) return toast("Please wait a moment before searching again.");
      lastSearchAt = now;
      closeSheet();
      toast("Searching…");

      const bounds = visibleSearchBounds();
      const cache = loadJSON(SEARCH_CACHE_KEY, {});
      const cacheKey = `${q.toLowerCase()}|${bounds.south.toFixed(2)},${bounds.west.toFixed(2)},${bounds.north.toFixed(2)},${bounds.east.toFixed(2)}`;
      let results = cache[cacheKey]?.results;
      const fresh = cache[cacheKey] && now - cache[cacheKey].savedAt < 24 * 60 * 60 * 1000;

      try {
        if (!fresh) {
          const params = new URLSearchParams({
            format: "jsonv2",
            q: `${q}, Seattle, Washington`,
            limit: "15",
            addressdetails: "1",
            bounded: "1",
            viewbox: `${bounds.west},${bounds.north},${bounds.east},${bounds.south}`
          });
          const [geoResponse, nearby] = await Promise.all([
            fetch(`https://nominatim.openstreetmap.org/search?${params.toString()}`, { headers: { "Accept": "application/json" } }).then(r => r.ok ? r.json() : []),
            searchNearbyBusinesses(q)
          ]);
          const combined = [...nearby, ...(geoResponse || [])];
          const seen = new Set();
          const origin = userLocation || map.getCenter();
          results = combined.filter(r => {
            const key = `${String(r.name || r.display_name).toLowerCase()}|${Number(r.lat).toFixed(4)}|${Number(r.lon).toFixed(4)}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          }).map(r => ({ ...r, _distance: Math.hypot(Number(r.lat) - origin.lat, (Number(r.lon) - origin.lng) * 0.7) }))
            .sort((a, b) => a._distance - b._distance)
            .slice(0, 30);
          cache[cacheKey] = { savedAt: now, results };
          const limitedCache = Object.fromEntries(Object.entries(cache).slice(-40));
          localStorage.setItem(SEARCH_CACHE_KEY, JSON.stringify(limitedCache));
        }
        renderSearchResultPins(results || []);
      } catch (_) {
        clearSearchResultMarkers();
        toast("Search could not load. Check the internet connection, or use Add and tap the map.");
      }
    }

    function guessCategory(result) {
      const type = `${result.type || ""} ${result.category || ""} ${result.display_name || ""}`.toLowerCase();
      if (/university|college|school|campus/.test(type)) return "school";
      if (/supermarket|grocery|market/.test(type)) return "grocery";
      if (/cafe|coffee|restaurant|fast_food|food/.test(type)) return "food";
      if (/station|bus_stop|platform|transit/.test(type)) return "transit";
      if (/library|study/.test(type)) return "study";
      if (/hospital|clinic|pharmacy|doctor/.test(type)) return "health";
      if (/park|museum|theatre|cinema|attraction/.test(type)) return "fun";
      return "other";
    }

    function clearSearchResultMarkers() {
      searchResultMarkers.forEach(marker => marker.remove());
      searchResultMarkers = [];

    function renderSearchResultPins(results) {
      clearSearchResultMarkers();
      lastSearchResults = results;

      if (!results.length) {
        toast("No places were found in the map area. Zoom or move the map, then search again.");
        return;
      }

      const coords = [];

      results.forEach((r, index) => {
        const lat = Number(r.lat);
        const lng = Number(r.lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
        coords.push([lng, lat]);

        const title = r.name || String(r.display_name || "Place").split(",")[0];

        const el = document.createElement("div");
        el.className = "search-pin-wrap";
        el.innerHTML = `<div class="search-pin-dot"></div><div class="search-pin-label">${esc(title)}</div>`;

        const popup = new maplibregl.Popup({ offset: 14, closeButton: false, maxWidth: "240px" }).setHTML(
          `<div class="popup-title">${esc(title)}</div><div class="popup-meta">${esc(r.display_name || "")}</div><button class="btn primary" style="margin-top:8px;width:100%;" data-action="add-search-result" data-index="${index}">＋ Add this pin</button>`
        );

        const marker = new maplibregl.Marker({ element: el, anchor: "left" })
          .setLngLat([lng, lat])
          .setPopup(popup)
          .addTo(map);

        searchResultMarkers.push(marker);
      });

      toast(`${results.length} place${results.length === 1 ? "" : "s"} found — tap a pin to see it.`);

      if (coords.length > 1) {
        const bounds = coords.reduce((b, c) => b.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
        map.fitBounds(bounds, { padding: { top: 140, right: 40, bottom: 220, left: 40 }, maxZoom: 16, duration: 600 });
      } else if (coords.length === 1) {
        setMapView(coords[0][1], coords[0][0], 15, true);
      }
    }

    async function loadTransitStops() {
      const center = map.getCenter();
      if (map.getZoom() < 13) map.setZoom(13);
      transitMarkers.forEach(marker => marker.remove());
      transitMarkers = [];
      toast("Loading nearby transit stops…");

      const bounds = map.getBounds();
      const padLat = Math.max((bounds.getNorth() - bounds.getSouth()) * 0.45, 0.018);
      const padLng = Math.max((bounds.getEast() - bounds.getWest()) * 0.45, 0.025);
      const south = Math.max(47.48, bounds.getSouth() - padLat);
      const west = Math.max(-122.47, bounds.getWest() - padLng);
      const north = Math.min(47.75, bounds.getNorth() + padLat);
      const east = Math.min(-122.20, bounds.getEast() + padLng);

      const query = `[out:json][timeout:22];(
        nwr(${south},${west},${north},${east})["highway"="bus_stop"];
        nwr(${south},${west},${north},${east})["public_transport"~"platform|station|stop_position"];
        nwr(${south},${west},${north},${east})["railway"~"station|halt|tram_stop|subway_entrance"];
      );out center tags;`;

      const endpoints = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.kumi.systems/api/interpreter",
        "https://overpass.nchc.org.tw/api/interpreter"
      ];

      let elements = null;
      for (const endpoint of endpoints) {
        try {
          const url = `${endpoint}?data=${encodeURIComponent(query)}`;
          const response = await fetch(url, { headers: { "Accept": "application/json" } });
          if (!response.ok) continue;
          const data = await response.json();
          if (Array.isArray(data.elements)) { elements = data.elements; break; }
        } catch (_) {}
      }

      const candidates = Array.isArray(elements) ? elements.map(item => ({
        name: item.tags?.name || item.tags?.ref || item.tags?.local_ref || "Transit stop",
        lat: Number(item.lat ?? item.center?.lat),
        lng: Number(item.lon ?? item.center?.lon),
        rail: Boolean(item.tags?.railway || item.tags?.station === "subway" || item.tags?.train === "yes" || item.tags?.light_rail === "yes")
      })) : [];

      const nearUW = Math.abs(center.lat - UW.lat) < 0.08 && Math.abs(center.lng - UW.lng) < 0.10;
      if (nearUW) candidates.push(...UW_TRANSIT_FALLBACK);

      const seen = new Set();
      let count = 0;
      for (const item of candidates) {
        const lat = Number(item.lat);
        const lng = Number(item.lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;
        if (lat < south || lat > north || lng < west || lng > east) continue;
        const name = item.name || "Transit stop";
        const key = `${name.toLowerCase()}|${lat.toFixed(4)}|${lng.toFixed(4)}`;
        if (seen.has(key)) continue;
        seen.add(key);
        const isRail = Boolean(item.rail);
        const el = document.createElement("div");
        el.className = "transit-marker";
        el.innerHTML = `<div class="transit-bubble">${isRail ? "🚉" : "🚌"}</div>`;
        el.title = name;
        const marker = new maplibregl.Marker({ element: el, anchor: "center" })
          .setLngLat([lng, lat])
          .setPopup(new maplibregl.Popup({ offset: 18, closeButton: false }).setHTML(`<div class="popup-title">${isRail ? "🚉" : "🚌"} ${esc(name)}</div><div class="popup-meta">Tap for directions or save this transit location.</div>`))
          .addTo(map);
        el.addEventListener("click", () => {
          setTimeout(() => {
            openSheet(`
              <div class="sheet-head"><h2>${isRail ? "Rail station" : "Transit stop"}</h2><button class="close-btn" data-action="close">×</button></div>
              <div class="place-title"><div class="big-emoji">${isRail ? "🚉" : "🚌"}</div><div><h2>${esc(name)}</h2><p>Nearby transit location</p></div></div>
              <div class="actions">
                <button class="btn primary" data-action="transit-to-stop" data-lat="${lat}" data-lng="${lng}">🚌 Directions here</button>
                <button class="btn gold" data-action="save-transit-stop" data-lat="${lat}" data-lng="${lng}" data-name="${esc(name)}">📍 Save stop</button>
              </div>
            `);
          }, 80);
        });
        transitMarkers.push(marker);
        count++;
        if (count >= 180) break;
      }

      if (count) {
        toast(`${count} nearby transit locations loaded.`);
      } else {
        settings.transitVisible = false;
        saveSettings();
        document.getElementById("transitBtn")?.classList.remove("active");
        toast("Transit data could not load. Try the UW button, then Transit again.");
      }
    }

    function todayEvents() {

    function splitTime(value = "") {
      const match = /^(\d{1,2}):(\d{2})$/.exec(String(value));
      let hour24 = match ? Number(match[1]) : 9;
      const minute = match ? Number(match[2]) : 0;
      const ampm = hour24 >= 12 ? "PM" : "AM";
      let hour = hour24 % 12;
      if (hour === 0) hour = 12;
      return { hour, minute, ampm };
    }

    function timeSelectHTML(prefix, value = "") {
      const t = splitTime(value);
      const hours = Array.from({length:12}, (_,i)=>i+1).map(h=>`<option value="${h}" ${h===t.hour?"selected":""}>${h}</option>`).join("");
      const minutes = Array.from({length:12}, (_,i)=>i*5).map(m=>`<option value="${String(m).padStart(2,"0")}" ${m===Math.round(t.minute/5)*5%60?"selected":""}>${String(m).padStart(2,"0")}</option>`).join("");
      return `<div class="time-row"><select name="${prefix}Hour" aria-label="Hour">${hours}</select><select name="${prefix}Minute" aria-label="Minute">${minutes}</select><select name="${prefix}AmPm" aria-label="AM or PM"><option ${t.ampm==="AM"?"selected":""}>AM</option><option ${t.ampm==="PM"?"selected":""}>PM</option></select></div>`;
    }

    function readTime(data, prefix) {
      let hour = Number(data.get(prefix + "Hour"));
      const minute = Number(data.get(prefix + "Minute"));
      const ampm = String(data.get(prefix + "AmPm") || "AM");
      if (!Number.isFinite(hour) || !Number.isFinite(minute)) return "";
      if (ampm === "PM" && hour !== 12) hour += 12;
      if (ampm === "AM" && hour === 12) hour = 0;
      return `${String(hour).padStart(2,"0")}:${String(minute).padStart(2,"0")}`;
    }

    function saveEvent(form) {
      const data=new FormData(form); const id=form.dataset.id||uid();
      const item={id,title:String(data.get("title")||"").trim(),placeId:String(data.get("placeId")||""),time:readTime(data,"time"),days:data.getAll("day").map(Number),notes:String(data.get("notes")||"").trim()};

      const i=schedule.findIndex(e=>e.id===id); if(i>=0)schedule[i]=item; else schedule.push(item); saveSchedule(); showSchedule(); toast("Schedule saved.");

    function showTripPlanner(destinationId="", eventId="") {
      const event=schedule.find(e=>e.id===eventId); if(event&&!destinationId)destinationId=event.placeId;
      const home=places.find(p=>p.category==="home");
      openSheet(`<div class="sheet-head"><h2>Plan a trip</h2><button class="close-btn" data-action="close">×</button></div>
      <form id="tripForm">
        <div class="field"><label>Starting from</label><select name="origin"><option value="current">◎ Current location</option>${placeOptions(home?.id||"")}</select></div>
        <div class="field"><label>Going to</label><select name="destination" required>${placeOptions(destinationId)}</select></div>
        <div class="field"><label>When</label><select name="timing" id="tripTiming"><option value="now">Leave now</option><option value="arrive">Arrive by</option></select></div>
        <div class="field" id="arrivalField" hidden><label>Arrival time</label>${timeSelectHTML("arrival", event?.time||"")}</div>
        <div class="actions"><button class="btn success" type="button" data-action="open-walk-plan">🚶 Walk</button><button class="btn primary" type="submit">🚌 Public transit</button></div>
      </form>`);
      setTimeout(()=>{const t=document.getElementById("tripTiming"),f=document.getElementById("arrivalField"); if(t)t.onchange=()=>f.hidden=t.value!=="arrive"; if(event?.time&&t){t.value="arrive";f.hidden=false;}},50);

    function launchTrip(form, mode) {
      const data=new FormData(form); const dest=places.find(p=>p.id===data.get("destination")); if(!dest)return toast("Choose a destination.");
      let origin=""; const ov=data.get("origin");
      if(ov==="current") { if(userLocation) origin=`&origin=${userLocation.lat},${userLocation.lng}`; }
      else { const op=places.find(p=>p.id===ov); if(op)origin=`&origin=${op.lat},${op.lng}`; }
      const url=`https://www.google.com/maps/dir/?api=1${origin}&destination=${dest.lat},${dest.lng}&travelmode=${mode}&dir_action=navigate`;
      if(data.get("timing")==="arrive") toast(`Google Maps will open. Choose Arrive by ${formatTime(readTime(data,"arrival"))}.`);
      window.open(url,"_blank","noopener,noreferrer");
    }

    function generateShareCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join("");
    }

    function myShareColumn() { return shareSession && shareSession.role === "creator" ? "creator_sharing" : "partner_sharing"; }
    function theirShareColumn() { return shareSession && shareSession.role === "creator" ? "partner_sharing" : "creator_sharing"; }

    function showFindMe() {
      if (shareSession) {
        openSheet(`
          <div class="sheet-head"><h2>Find Me</h2><button class="close-btn" data-action="close">×</button></div>
          <p class="place-note" id="findMeStatusLine">Checking connection…</p>

          <button class="btn" data-action="findme-unpair" style="margin-top:14px;background:transparent;color:#a33b67;box-shadow:none;">Unpair from this person</button>
        `);

        refreshFindMeStatusLine();

      openSheet(`
        <div class="sheet-head"><h2>Find Me</h2><button class="close-btn" data-action="close">×</button></div>
        <p class="place-note">Pair with one person, one time — after that, sharing your location is just a single button, no code needed again.</p>

          </form>

    async function createFindMeCode() {
      const code = generateShareCode();
      toast("Creating code…");

      const { error } = await mymapSupabase.from("mymap_shares").insert({ code, creator_id: myDeviceId });
      if (error) { toast("Couldn't create a code. Try again."); return; }

      shareSession = { code, role: "creator" };
      localStorage.setItem(SHARE_KEY, JSON.stringify(shareSession));
      subscribeToPairChannel();
      showFindMePairedShareStep(code);
    }

    function showFindMePairedShareStep(code) {
      openSheet(`
        <div class="sheet-head"><h2>Send this code</h2><button class="close-btn" data-action="close">×</button></div>
        <p class="place-note">Send this to the one person you want paired with. You'll only need to do this once.</p>
        <p class="place-note" style="font-size:26px;letter-spacing:4px;text-align:center;"><strong>${esc(code)}</strong></p>
        <button class="btn primary" data-action="findme-share-code" data-code="${esc(code)}">Share this code</button>
      `);
    }

    async function submitFindMeCode(rawCode) {
      const code = rawCode.trim().toUpperCase();
      if (code.length < 4) { toast("Enter the full code."); return; }

      toast("Joining…");
      const { data, error } = await mymapSupabase.from("mymap_shares").select("*").eq("code", code).maybeSingle();

      if (error || !data) { toast("That code wasn't found."); return; }
      if (data.partner_id && data.partner_id !== myDeviceId) { toast("That code has already been used."); return; }
      if (data.creator_id === myDeviceId) { toast("That's your own code."); return; }

      if (!data.partner_id) {
        const { error: updateError } = await mymapSupabase.from("mymap_shares").update({ partner_id: myDeviceId }).eq("code", code).is("partner_id", null);
        if (updateError) { toast("That code was just used by someone else."); return; }
      }

      shareSession = { code, role: "partner" };
      localStorage.setItem(SHARE_KEY, JSON.stringify(shareSession));
      subscribeToPairChannel();
      toast("Paired! You're all set.");
      showFindMe();
    }

    async function refreshFindMeStatusLine() {
      if (!shareSession) return;
      const { data } = await mymapSupabase.from("mymap_shares").select("*").eq("code", shareSession.code).maybeSingle();
      const line = document.getElementById("findMeStatusLine");
      if (!line) return;

      if (!data || !data.partner_id) { line.innerText = "Paired — waiting for the other person to finish setup."; return; }

      const theirSharing = data[theirShareColumn()];
      line.innerText = theirSharing
        ? "Paired — they're currently sharing their location."
        : "Paired — they're not sharing their location right now.";
    }

    function shareCodeViaSystemShare(code) {
      const text = `Let's use Find Me on MyMap so we can see each other's location — open the app, tap Find Me, tap "Or enter a code", and enter: ${code}`;
      if (navigator.share) {
        navigator.share({ text }).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => toast("Code copied — paste it in a text!"));
      } else {
        toast(`Your code: ${code}`);
      }
    }

    function renderPartnerMarker(lat, lng) {
      partnerLat = lat;
      partnerLng = lng;
      updateFindPartnerButtonVisibility();

      if (partnerMarker) {
        partnerMarker.setLngLat([lng, lat]);
      } else {
        const el = document.createElement("div");
        el.innerHTML = '<div class="user-dot" style="background:#a33b67;box-shadow:0 0 0 8px rgba(163,59,103,.2),0 3px 10px rgba(0,0,0,.25);"></div>';
        el.title = "Their location";
        partnerMarker = new maplibregl.Marker({ element: el, anchor: "center" }).setLngLat([lng, lat]).addTo(map);
      }

      if (followPartner) {
        map.easeTo({ center: [lng, lat], duration: 900 });
      }
    }

    function removePartnerMarker() {
      if (partnerMarker) { partnerMarker.remove(); partnerMarker = null; }
      partnerLat = null;
      partnerLng = null;
      updateFindPartnerButtonVisibility();
    }

    function tapFindPartnerBtn() {
      if (partnerLat === null) { toast("No location from them yet."); return; }
      followPartner = true;
      followMe = false;
      updateFindPartnerButtonVisibility();
      updateFollowMeButtonVisibility();
      map.easeTo({ center: [partnerLng, partnerLat], zoom: Math.max(map.getZoom(), 16) });
    }

    function updateFindPartnerButtonVisibility() {
      const btn = document.getElementById("findPartnerBtn");
      if (!btn) return;
      btn.style.display = (partnerLat !== null) ? "flex" : "none";
      btn.classList.toggle("following", followPartner);

        followPartner = false;
        followMe = false;
        updateFindPartnerButtonVisibility();
        updateFollowMeButtonVisibility();
      }
    });

    map.on("zoomstart", e => {
      if (!e.originalEvent) return;

        updateFindPartnerButtonVisibility();

      }

    document.getElementById("findPartnerBtn").addEventListener("click", tapFindPartnerBtn);

    function subscribeToPairChannel() {
      if (!shareSession) return;
      if (shareChannel) { try { shareChannel.unsubscribe(); } catch (e) {} }

      shareChannel = mymapSupabase.channel(`mymap-share-${shareSession.code}`, { config: { broadcast: { ack: false, self: false } } });
      shareChannel.on("broadcast", { event: "location" }, ({ payload }) => {
        if (!payload || payload.deviceId === myDeviceId) return;
        renderPartnerMarker(payload.lat, payload.lng);
      }).on("broadcast", { event: "stopped" }, ({ payload }) => {
        if (!payload || payload.deviceId === myDeviceId) return;
        removePartnerMarker();
      }).subscribe();

      if (sharePollTimer) clearInterval(sharePollTimer);
      sharePollTimer = setInterval(refreshFindMeStatusLine, 8000);
    }

    function startBroadcastingMyLocation() {
      if (shareWatchId !== null) navigator.geolocation.clearWatch(shareWatchId);
      if (!navigator.geolocation) return;

      shareWatchId = navigator.geolocation.watchPosition(position => {
        const now = Date.now();
        if (now - lastBroadcastAt < 5000) return;
        lastBroadcastAt = now;

        if (shareChannel) {
          shareChannel.send({
            type: "broadcast",
            event: "location",
            payload: { deviceId: myDeviceId, lat: position.coords.latitude, lng: position.coords.longitude }
          });
        }
      }, () => {}, { enableHighAccuracy: true, maximumAge: 15000, timeout: 15000 });
    }

    function stopBroadcastingMyLocation() {
      if (shareWatchId !== null) { navigator.geolocation.clearWatch(shareWatchId); shareWatchId = null; }
      if (shareChannel) {
        shareChannel.send({ type: "broadcast", event: "stopped", payload: { deviceId: myDeviceId } });
      }
    }

    async function toggleFindMeSharing() {
      if (!shareSession) return;

      sharingOn = !sharingOn;
      localStorage.setItem(SHARING_ON_KEY, JSON.stringify(sharingOn));

      await mymapSupabase.from("mymap_shares").update({ [myShareColumn()]: sharingOn }).eq("code", shareSession.code);

      if (sharingOn) { startBroadcastingMyLocation(); toast("Sharing your location."); }
      else { stopBroadcastingMyLocation(); toast("Stopped sharing your location."); }

      showFindMe();
    }

    async function unpairFindMe() {
      if (shareSession) {
        await mymapSupabase.from("mymap_shares").delete().eq("code", shareSession.code);
      }

      if (shareChannel) { try { shareChannel.unsubscribe(); } catch (e) {} shareChannel = null; }
      if (shareWatchId !== null) { navigator.geolocation.clearWatch(shareWatchId); shareWatchId = null; }
      if (sharePollTimer) { clearInterval(sharePollTimer); sharePollTimer = null; }

      removePartnerMarker();
      shareSession = null;
      sharingOn = false;
      localStorage.removeItem(SHARE_KEY);
      localStorage.removeItem(SHARING_ON_KEY);
      closeSheet();
      toast("Unpaired.");
    }

    if (shareSession) {
      subscribeToPairChannel();
      if (sharingOn) startBroadcastingMyLocation();
    }

    function exportData() {
      const data = {
        app: "MyMap",
        version: APP_VERSION,
        exportedAt: new Date().toISOString(),
        places,
        schedule
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `mymap-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
      toast("Backup downloaded.");
    }

    async function importData(file) {
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (!Array.isArray(data.places)) throw new Error("Invalid backup");
        const cleaned = data.places.filter(p => p && Number.isFinite(Number(p.lat)) && Number.isFinite(Number(p.lng)) && p.title).map(p => ({
          id: String(p.id || uid()),
          title: String(p.title).slice(0,80),
          category: CATEGORIES[p.category] ? p.category : "other",
          address: String(p.address || "").slice(0,180),
          notes: String(p.notes || "").slice(0,1500),
          favorite: Boolean(p.favorite),
          visited: Boolean(p.visited),
          lat: Number(p.lat),
          lng: Number(p.lng),
          createdAt: p.createdAt || new Date().toISOString(),
          updatedAt: p.updatedAt || new Date().toISOString()
        }));
        if (!confirm(`Restore ${cleaned.length} pins? This will replace the pins currently on this device.`)) return;
        places = cleaned;
        schedule = Array.isArray(data.schedule) ? data.schedule : schedule;
        savePlaces();
        saveSchedule();
        renderMarkers();
        closeSheet();
        toast(`${places.length} pins restored.`);
      } catch (_) {
        toast("That file is not a valid MyMap backup.");
      } finally {
        document.getElementById("importInput").value = "";
      }
    }

    (function setupSearchMic() {
      const micBtn = document.getElementById("searchMicBtn");
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) { micBtn.style.display = "none"; return; }

      const recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = "en-US";
      let listening = false;

      recognition.onstart = () => { listening = true; micBtn.classList.add("listening"); micBtn.innerText = "●"; };
      recognition.onend = () => { listening = false; micBtn.classList.remove("listening"); micBtn.innerText = "🎤"; };
      recognition.onerror = () => { listening = false; micBtn.classList.remove("listening"); micBtn.innerText = "🎤"; };

      recognition.onresult = event => {
        const transcript = event.results[0][0].transcript.trim();
        if (!transcript) return;
        const input = document.getElementById("searchInput");
        input.value = transcript;
        input.blur();
        searchPlaces(transcript);
      };

      micBtn.addEventListener("click", () => {
        if (listening) { recognition.stop(); return; }
        document.getElementById("searchInput").blur();
        try { recognition.start(); } catch (_) {}
      });
    })();

      if (event.target.id === "eventForm") { event.preventDefault(); saveEvent(event.target); }
      if (event.target.id === "tripForm") { event.preventDefault(); launchTrip(event.target, "transit"); }

    });

    sheet.addEventListener("click", event => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const action = button.dataset.action;
      const id = button.dataset.id;

      if (action === "close") closeSheet();
      if (action === "open-place") { closeSheet(); const p = places.find(x => x.id === id); if (p) { setMapView(p.lat, p.lng, Math.max(map.getZoom(), 16)); showPlace(id); } }
      if (action === "edit") { const p = places.find(x => x.id === id); if (p) { editingId = id; pendingLatLng = { lat: p.lat, lng: p.lng }; showEditForm(p); } }
      if (action === "delete") deletePlace(id);
      if (action === "directions") { const p = places.find(x => x.id === id); if (p) openDirections(p, button.dataset.mode); }
      if (action === "share") { const p = places.find(x => x.id === id); if (p) sharePlace(p); }
      if (action === "filter") { activeFilter = button.dataset.filter || "all"; renderMarkers(); showPins(); }

      if (action === "export") exportData();
      if (action === "import") document.getElementById("importInput").click();
      if (action === "center-uw") { closeSheet(); setMapView(UW.lat, UW.lng, 15); }
      if (action === "help") showHelp();
      if (action === "transit-to-stop") {
        const p = { lat: Number(button.dataset.lat), lng: Number(button.dataset.lng) };
        openDirections(p, "transit");
      }
      if (action === "save-transit-stop") {
        const lat = Number(button.dataset.lat), lng = Number(button.dataset.lng);
        closeSheet();
        startAdd({ lat, lng }, { title: button.dataset.name || "Transit stop", category: "transit", address: "" });
      }
      if (action === "show-schedule") showSchedule();
      if (action === "add-event") showEventForm();
      if (action === "edit-event") { const e=schedule.find(x=>x.id===id); if(e)showEventForm(e); }
      if (action === "delete-event") { if(confirm("Delete this schedule item?")){ schedule=schedule.filter(x=>x.id!==id); saveSchedule(); showSchedule(); } }
      if (action === "plan-event") showTripPlanner("", id);
      if (action === "plan-to-place") showTripPlanner(id);
      if (action === "open-walk-plan") { const form=document.getElementById("tripForm"); if(form)launchTrip(form,"walking"); }
      if (action === "show-neighborhoods") showNeighborhoods();
      if (action === "jump-neighborhood") { const n=NEIGHBORHOODS[button.dataset.key]; if(n){closeSheet();showNeighborhood(n, true);toast(`Showing ${n.label}.`);} }
      if (action === "show-meet") showMeetMe();
      if (action === "show-findme") showFindMe();
      if (action === "findme-create") createFindMeCode();
      if (action === "findme-toggle") toggleFindMeSharing();
      if (action === "findme-unpair") { if (confirm("Unpair from this person? You'll need a new code to pair again.")) unpairFindMe(); }
      if (action === "findme-share-code") { shareCodeViaSystemShare(button.dataset.code); showFindMe(); }
      if (action === "go-category") goCategory(button.dataset.category);
      if (action === "show-school") goCategory("school");
      if (action === "toggle-transit") { closeSheet(); toggleTransit(); }
      if (action === "locate") { closeSheet(); locateUser(true); }
    });

    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }

    setTimeout(() => {
      if (!settings.welcomed) {
        settings.welcomed = true; saveSettings();
        openSheet(`<div class="sheet-head"><h2>Welcome to MyMap</h2><button class="close-btn" data-action="close">×</button></div><div class="place-note">Press the purple <strong>+</strong> button to add your home location, work location, school, and each campus building or destination you regularly visit.</div><div class="place-note">Use <strong>Schedule</strong> for classes, work shifts, appointments, and regular trips. Use <strong>Plan</strong> for Leave Now or Arrive By transit directions.</div><button class="btn primary" data-action="close">Start using MyMap</button>`);
      } else if (!places.length) showTip("Press + to add your home, work, school, campus buildings, and favorite places.", 4800);
    }, 900);
  })();
  </script>
</body>
</html>

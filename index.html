<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#4b2e83" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MyMap" />
  <title>MyMap</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.7.1/dist/maplibre-gl.css" />
  <style>
    /* Critical MapLibre layout rules are included locally. The actual map is
       drawn in one WebGL canvas, so separate image tiles cannot drift apart. */
    .maplibregl-map { position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    .maplibregl-canvas-container, .maplibregl-canvas { position: absolute; left: 0; top: 0; }
    .maplibregl-canvas { outline: none; }
    .maplibregl-control-container { position: absolute; inset: 0; pointer-events: none; }
    .maplibregl-ctrl-top-left, .maplibregl-ctrl-top-right,
    .maplibregl-ctrl-bottom-left, .maplibregl-ctrl-bottom-right { position: absolute; pointer-events: none; z-index: 2; }
    .maplibregl-ctrl-top-left { top: 0; left: 0; }
    .maplibregl-ctrl-top-right { top: 0; right: 0; }
    .maplibregl-ctrl-bottom-left { bottom: 0; left: 0; }
    .maplibregl-ctrl-bottom-right { right: 0; bottom: 0; }
    .maplibregl-ctrl { clear: both; pointer-events: auto; transform: translate(0,0); }
    .maplibregl-marker { position: absolute; top: 0; left: 0; will-change: transform; }
    .maplibregl-popup { position: absolute; top: 0; left: 0; display: flex; will-change: transform; pointer-events: none; }
    .maplibregl-popup-content { position: relative; pointer-events: auto; background: white; border-radius: 16px; box-shadow: var(--shadow); padding: 11px 13px; min-width: 150px; }

    :root {
      --purple: #4b2e83;
      --purple-2: #6b4aa0;
      --gold: #b7a57a;
      --gold-soft: #f3ead1;
      --ink: #241f2e;
      --muted: #726b7d;
      --paper: #ffffff;
      --bg: #f6f3fb;
      --danger: #b42318;
      --success: #247a4a;
      --shadow: 0 10px 28px rgba(36, 31, 46, 0.16);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; min-height: 100%; margin: 0; overflow: hidden; }
    @supports (height: 100dvh) {
      html, body { height: 100dvh; }
    }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
    }
    button, input, textarea, select { font: inherit; }
    button { touch-action: manipulation; }

    #app { position: fixed; inset: 0; width: 100%; height: 100%; min-height: 100%; overflow: hidden; }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; min-height: 100%; background: #dfe8e3; }

    .topbar {
      position: absolute;
      z-index: 900;
      top: calc(10px + var(--safe-top));
      left: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      pointer-events: none;
    }
    .brand {
      width: 64px;
      height: 64px;
      flex: 0 0 64px;
      padding: 7px 5px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(75, 46, 131, 0.96);
      color: white;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 16px;
      box-shadow: var(--shadow);
      pointer-events: auto;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 0;
      line-height: .95;
    }
    .brand small {
      display: block;
      width: 100%;
      margin-top: 6px;
      font-size: 8px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      opacity: .88;
      letter-spacing: .08em;
    }

    .search-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border-radius: 16px;
      background: rgba(255,255,255,.96);
      box-shadow: var(--shadow);
      border: 1px solid rgba(75,46,131,.12);
      pointer-events: auto;
    }
    #searchInput {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      padding: 8px 5px;
      color: var(--ink);
      background: transparent;
    }
    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 13px;
      background: #f0eaf8;
      color: var(--purple);
      font-size: 20px;
      font-weight: 900;
    }
    .icon-btn:active { transform: scale(.96); }

    .jump-strip {
      position: absolute;
      z-index: 880;
      top: calc(84px + var(--safe-top));
      left: 10px;
      right: 10px;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 2px 2px 7px;
      scrollbar-width: none;
      pointer-events: auto;
    }
    .jump-strip::-webkit-scrollbar { display: none; }
    .jump-chip {
      flex: 0 0 auto;
      min-height: 36px;
      border: 1px solid rgba(75,46,131,.16);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(255,255,255,.96);
      color: var(--purple);
      box-shadow: 0 4px 12px rgba(36,31,46,.13);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .jump-chip:active { transform: scale(.97); }

    .map-tip {
      position: absolute;
      z-index: 750;
      top: calc(128px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      max-width: calc(100% - 30px);
      background: rgba(36,31,46,.92);
      color: white;
      padding: 8px 13px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 750;
      box-shadow: 0 5px 18px rgba(0,0,0,.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      text-align: center;
    }
    .map-tip.show { opacity: 1; transform: translate(-50%, 3px); }

    .bottom-nav {
      position: absolute;
      z-index: 900;
      left: 10px;
      right: 10px;
      bottom: calc(10px + var(--safe-bottom));
      height: 68px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      padding: 6px;
      border-radius: 22px;
      background: rgba(255,255,255,.97);
      box-shadow: var(--shadow);
      border: 1px solid rgba(75,46,131,.12);
    }
    .nav-btn {
      position: relative;
      height: 54px;
      border: 0;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2px;
      font-weight: 800;
      font-size: 10px;
    }
    .nav-btn span:first-child { font-size: 22px; line-height: 1; }
    .nav-btn.active { background: #f0eaf8; color: var(--purple); }
    .nav-btn.add {
      width: 58px;
      height: 58px;
      justify-self: center;
      margin-top: -28px;
      border-radius: 50%;
      background: var(--purple);
      color: white;
      border: 4px solid white;
      box-shadow: 0 8px 20px rgba(75,46,131,.36);
    }
    .nav-btn.add span:first-child { font-size: 28px; }

    .sheet-backdrop {
      position: absolute;
      z-index: 1000;
      inset: 0;
      background: rgba(30,24,40,.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }
    .sheet-backdrop.show { opacity: 1; pointer-events: auto; }

    .sheet {
      position: absolute;
      z-index: 1010;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: min(84vh, 760px);
      border-radius: 26px 26px 0 0;
      background: var(--paper);
      box-shadow: 0 -16px 40px rgba(36,31,46,.2);
      transform: translateY(105%);
      transition: transform .25s ease;
      padding: 10px 16px calc(18px + var(--safe-bottom));
      overflow: auto;
      overscroll-behavior: contain;
    }
    .sheet.show { transform: translateY(0); }
    .handle { width: 46px; height: 5px; margin: 0 auto 10px; border-radius: 99px; background: #d8d2df; }
    .sheet-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .sheet-head h2 { margin: 0; font-size: 22px; flex: 1; }
    .close-btn { border: 0; background: #eeeaf2; border-radius: 50%; width: 40px; height: 40px; font-size: 22px; }

    .field { margin: 12px 0; }
    .field label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 850; color: #554d60; }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid #dcd5e4;
      border-radius: 14px;
      padding: 12px 13px;
      outline: 0;
      background: #fcfbfd;
      color: var(--ink);
    }
    .field textarea { resize: vertical; min-height: 94px; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--purple-2); box-shadow: 0 0 0 3px rgba(75,46,131,.1); }

    .switch-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .switch-card { display: flex; align-items: center; gap: 9px; padding: 11px; border-radius: 14px; background: #f8f5fb; font-weight: 750; font-size: 13px; }
    .switch-card input { width: 20px; height: 20px; accent-color: var(--purple); }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 16px; }
    .actions.one { grid-template-columns: 1fr; }
    .btn {
      min-height: 48px;
      padding: 10px 14px;
      border: 0;
      border-radius: 14px;
      font-weight: 900;
      background: #eeeaf2;
      color: var(--ink);
    }
    .btn.primary { background: var(--purple); color: white; }
    .btn.gold { background: var(--gold-soft); color: #5c4a1f; }
    .btn.danger { background: #fde9e7; color: var(--danger); }
    .btn.success { background: #e6f5eb; color: var(--success); }
    .btn:active { transform: scale(.985); }

    .category-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 9px;
      scrollbar-width: none;
    }
    .category-strip::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      border: 1px solid #ded6e7;
      border-radius: 999px;
      padding: 9px 12px;
      background: white;
      font-weight: 800;
      color: #5e5669;
    }
    .chip.active { background: var(--purple); color: white; border-color: var(--purple); }

    .pin-list { display: grid; gap: 9px; padding-bottom: 4px; }
    .pin-card {
      display: grid;
      grid-template-columns: 45px 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid #e5dfeb;
      border-radius: 17px;
      background: #fff;
      padding: 10px;
      text-align: left;
    }
    .pin-card .emoji { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 14px; font-size: 23px; background: #f4eff9; }
    .pin-card h3 { margin: 0 0 3px; font-size: 15px; }
    .pin-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .pin-card .distance { font-weight: 900; color: var(--purple); font-size: 12px; white-space: nowrap; }
    .empty { padding: 32px 14px; text-align: center; color: var(--muted); }
    .empty .big { font-size: 42px; display: block; margin-bottom: 8px; }

    .place-title { display: flex; gap: 12px; align-items: center; }
    .place-title .big-emoji { width: 54px; height: 54px; border-radius: 17px; background: #f1ebf7; display: grid; place-items: center; font-size: 30px; }
    .place-title h2 { margin: 0 0 3px; }
    .place-title p { margin: 0; color: var(--muted); font-size: 13px; }
    .place-note { margin: 14px 0; padding: 13px; background: #f8f5fb; border-radius: 14px; white-space: pre-wrap; line-height: 1.45; }
    .stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin: 12px 0; }
    .stat { padding: 11px; border: 1px solid #e5dfeb; border-radius: 14px; }
    .stat strong { display: block; font-size: 15px; color: var(--purple); }
    .stat small { color: var(--muted); }

    .search-results { display: grid; gap: 8px; margin-top: 10px; }
    .search-result { border: 1px solid #e3dce9; border-radius: 14px; padding: 11px; background: white; text-align: left; }
    .search-result strong { display: block; margin-bottom: 3px; }
    .search-result small { color: var(--muted); line-height: 1.35; }

    .menu-list { display: grid; gap: 9px; }
    .menu-item { width: 100%; padding: 13px; border-radius: 14px; border: 1px solid #e3dce9; background: white; text-align: left; font-weight: 800; }
    .fine-print { font-size: 12px; color: var(--muted); line-height: 1.45; }

    .quick-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:9px; margin:10px 0 15px; }
    .quick-card { min-height:82px; padding:12px 9px; border:1px solid #e3dce9; border-radius:17px; background:#fff; text-align:center; font-weight:850; color:var(--ink); }
    .quick-card span { display:block; font-size:27px; margin-bottom:5px; }
    .next-card { padding:15px; border-radius:18px; background:linear-gradient(135deg,#4b2e83,#6b4aa0); color:white; margin:4px 0 14px; }
    .next-card h3 { margin:0 0 5px; font-size:18px; }
    .next-card p { margin:3px 0; opacity:.92; }
    .next-card .btn { margin-top:10px; background:white; color:var(--purple); }
    .event-card { border:1px solid #e4ddeb; border-radius:17px; padding:12px; margin:9px 0; background:white; }
    .event-card h3 { margin:0 0 4px; }
    .event-card p { margin:3px 0; color:var(--muted); font-size:13px; }
    .event-actions { display:flex; gap:7px; margin-top:9px; }
    .event-actions .btn { padding:9px; min-height:40px; }
    .day-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
    .day-check { border:1px solid #ddd4e5; border-radius:12px; padding:8px 4px; text-align:center; font-size:12px; }
    .day-check input { display:block; margin:0 auto 4px; }
    .segmented { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:5px; border-radius:14px; background:#f1ebf7; margin:10px 0; }
    .segmented button { border:0; border-radius:11px; padding:10px; font-weight:850; background:transparent; color:var(--purple); }
    .segmented button.active { background:white; box-shadow:0 2px 8px rgba(36,31,46,.12); }

    .toast {
      position: absolute;
      z-index: 1300;
      left: 50%;
      bottom: calc(94px + var(--safe-bottom));
      transform: translate(-50%, 20px);
      max-width: calc(100% - 30px);
      background: rgba(36,31,46,.95);
      color: white;
      padding: 10px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      text-align: center;
      font-size: 13px;
      font-weight: 750;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .maplibregl-ctrl-top-left { margin-top: 108px; margin-left: 10px; }
    .maplibregl-ctrl-group { border-radius: 12px !important; overflow: hidden; box-shadow: var(--shadow) !important; }
    .maplibregl-ctrl-group button { width: 34px; height: 34px; border: 0; background-color: white; }
    .maplibregl-ctrl-attrib { font-size: 9px; margin-bottom: 84px !important; background: rgba(255,255,255,.82); }
    .popup-title { font-weight: 900; margin-bottom: 4px; }
    .popup-meta { color: var(--muted); font-size: 12px; }

    .map-pin { background: transparent; border: 0; }
    .pin-bubble {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50% 50% 50% 10%;
      transform: rotate(-45deg);
      border: 3px solid white;
      box-shadow: 0 4px 11px rgba(36,31,46,.3);
      background: var(--purple);
    }
    .pin-bubble > span { transform: rotate(45deg); font-size: 21px; }
    .pin-bubble.favorite { background: #a33b67; }
    .pin-bubble.visited { background: #2d7a51; }
    .transit-marker { background: transparent; border: 0; }
    .transit-bubble { width: 30px; height: 30px; display: grid; place-items: center; border: 2px solid white; border-radius: 10px; box-shadow: 0 3px 9px rgba(0,0,0,.25); background: #206da8; font-size: 16px; }
    .user-dot { width: 22px; height: 22px; border-radius: 50%; background: #1877f2; border: 4px solid white; box-shadow: 0 0 0 8px rgba(24,119,242,.2), 0 3px 10px rgba(0,0,0,.25); }

    @media (min-width: 780px) {
      .topbar { left: 20px; right: auto; width: min(560px, calc(100% - 40px)); }
      .bottom-nav { left: 50%; right: auto; width: 520px; transform: translateX(-50%); }
      .sheet { left: auto; right: 18px; bottom: 96px; width: 430px; max-height: calc(100vh - 130px); border-radius: 24px; }
      .maplibregl-ctrl-attrib { margin-bottom: 0 !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map" aria-label="Interactive map"></div>

    <header class="topbar">
      <button class="brand" id="menuBtn" aria-label="Open app menu">MM<small>SEATTLE</small></button>
      <form class="search-wrap" id="searchForm">
        <input id="searchInput" type="search" autocomplete="off" enterkeyhint="search" placeholder="Search Seattle places…" aria-label="Search for a place" />
        <button class="icon-btn" type="submit" aria-label="Search">⌕</button>
      </form>
    </header>

    <div class="jump-strip" id="jumpStrip" aria-label="Jump to a Seattle neighborhood">
      <button class="jump-chip" data-jump="uw">🎓 UW</button>
      <button class="jump-chip" data-jump="udistrict">U District</button>
      <button class="jump-chip" data-jump="capitolhill">Capitol Hill</button>
      <button class="jump-chip" data-jump="downtown">Downtown</button>
      <button class="jump-chip" data-jump="fremont">Fremont</button>
      <button class="jump-chip" data-jump="ballard">Ballard</button>
      <button class="jump-chip" data-jump="greenlake">Green Lake</button>
      <button class="jump-chip" data-jump="queenanne">Queen Anne</button>
    </div>

    <div class="map-tip" id="mapTip">Tap the map where you want the pin.</div>

    <nav class="bottom-nav" aria-label="Main controls">
      <button class="nav-btn" id="pinsBtn"><span>📍</span><span>Places</span></button>
      <button class="nav-btn" id="scheduleBtn"><span>📅</span><span>Schedule</span></button>
      <button class="nav-btn add" id="addBtn" aria-label="Add a place"><span>＋</span><span>Add</span></button>
      <button class="nav-btn" id="planBtn"><span>🧭</span><span>Plan</span></button>
      <button class="nav-btn" id="moreBtn"><span>☰</span><span>More</span></button>
    </nav>

    <div class="sheet-backdrop" id="backdrop"></div>
    <section class="sheet" id="sheet" aria-live="polite"></section>
    <div class="toast" id="toast"></div>
    <input type="file" id="importInput" accept="application/json,.json" hidden />
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.7.1/dist/maplibre-gl.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/maplibre-gl@5.7.1/dist/maplibre-gl.js'"></script>
  <script>
  (() => {
    "use strict";

    const APP_VERSION = 8;
    const STORAGE_KEY = "huskySteps.places.v1";
    const SETTINGS_KEY = "huskySteps.settings.v1";
    const SCHEDULE_KEY = "mymap.schedule.v1";
    const SEARCH_CACHE_KEY = "huskySteps.searchCache.v1";
    const UW = { lat: 47.6553, lng: -122.3035 };
    const NEIGHBORHOODS = {
      uw: { label: "UW", lat: 47.6553, lng: -122.3035, zoom: 16 },
      udistrict: { label: "University District", lat: 47.6615, lng: -122.3132, zoom: 15.5 },
      capitolhill: { label: "Capitol Hill", lat: 47.6233, lng: -122.3190, zoom: 15 },
      downtown: { label: "Downtown", lat: 47.6065, lng: -122.3320, zoom: 14.7 },
      fremont: { label: "Fremont", lat: 47.6510, lng: -122.3504, zoom: 15 },
      ballard: { label: "Ballard", lat: 47.6687, lng: -122.3860, zoom: 15 },
      greenlake: { label: "Green Lake", lat: 47.6803, lng: -122.3280, zoom: 14.8 },
      queenanne: { label: "Queen Anne", lat: 47.6376, lng: -122.3566, zoom: 14.8 }
    };
    const UW_TRANSIT_FALLBACK = [
      { name: "U District Station", lat: 47.6601, lng: -122.3132, rail: true },
      { name: "University of Washington Station", lat: 47.6500, lng: -122.3038, rail: true }
    ];
    const SEATTLE_VIEWBOX = "-122.4597,47.7341,-122.2244,47.4919";

    const CATEGORIES = {
      home:    { label: "Home", emoji: "🏠" },
      school:  { label: "School / Campus building", emoji: "🎓" },
      work:    { label: "Work", emoji: "💼" },
      uw:      { label: "UW / Class building", emoji: "🏛️" },
      grocery: { label: "Groceries", emoji: "🛒" },
      food:    { label: "Food & coffee", emoji: "☕" },
      transit: { label: "Transit", emoji: "🚉" },
      study:   { label: "Study", emoji: "📚" },
      health:  { label: "Health", emoji: "💊" },
      fun:     { label: "Parks & fun", emoji: "🌳" },
      other:   { label: "Other", emoji: "📌" }
    };

    let places = loadJSON(STORAGE_KEY, []);
    let settings = loadJSON(SETTINGS_KEY, { transitVisible: false, welcomed: false });
    let schedule = loadJSON(SCHEDULE_KEY, []);
    let markers = new Map();
    let activeFilter = "all";
    let pendingLatLng = null;
    let editingId = null;
    let placementMode = false;
    let transitMarkers = [];
    let userMarker = null;
    let userLocation = null;
    let toastTimer = null;
    let tipTimer = null;
    let lastSearchAt = 0;
    let selectedSearchResult = null;

    if (!window.maplibregl) {
      document.getElementById("map").innerHTML = '<div style="display:grid;place-items:center;height:100%;padding:30px;text-align:center;background:#f6f3fb;color:#4b2e83;font-weight:800">The map library could not load. Check the internet connection and reopen MyMap.</div>';
      return;
    }

    const map = new maplibregl.Map({
      container: "map",
      center: [UW.lng, UW.lat],
      zoom: 14,
      attributionControl: true,
      style: {
        version: 8,
        sources: {
          cleanmap: {
            type: "raster",
            tiles: [
              "https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
              "https://b.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
              "https://c.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png"
            ],
            tileSize: 256,
            maxzoom: 20,
            attribution: "© OpenStreetMap contributors © CARTO"
          }
        },

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-left");

    function setMapView(lat, lng, zoom, animate = false) {
      const options = { center: [lng, lat], zoom };

    function refreshMapSize() {

    const sheet = document.getElementById("sheet");
    const backdrop = document.getElementById("backdrop");
    const toastEl = document.getElementById("toast");
    const mapTip = document.getElementById("mapTip");

    function loadJSON(key, fallback) {
      try {
        const value = JSON.parse(localStorage.getItem(key));
        return value ?? fallback;
      } catch (_) {
        return fallback;
      }
    }

    function savePlaces() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(places));
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function saveSchedule() {
      localStorage.setItem(SCHEDULE_KEY, JSON.stringify(schedule));
    }

    function uid() {
      return (crypto.randomUUID ? crypto.randomUUID() : Date.now() + "-" + Math.random().toString(16).slice(2));
    }

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add("show");
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2600);
    }

    function showTip(message, duration = 2500) {
      clearTimeout(tipTimer);
      mapTip.textContent = message;
      mapTip.classList.add("show");
      if (duration) tipTimer = setTimeout(() => mapTip.classList.remove("show"), duration);

    function openSheet(html) {
      sheet.innerHTML = '<div class="handle"></div>' + html;
      sheet.classList.add("show");
      backdrop.classList.add("show");
    }

    function closeSheet() {
      sheet.classList.remove("show");

    function categoryOptions(selected = "other") {
      return Object.entries(CATEGORIES).map(([key, item]) =>
        `<option value="${key}" ${key === selected ? "selected" : ""}>${item.emoji} ${esc(item.label)}</option>`

    function markerElement(place, extraClass = "") {
      const cat = CATEGORIES[place.category] || CATEGORIES.other;
      const stateClass = place.favorite ? "favorite" : (place.visited ? "visited" : "");
      const el = document.createElement("div");
      el.className = `map-pin ${extraClass}`.trim();
      el.innerHTML = `<div class="pin-bubble ${stateClass}"><span>${cat.emoji}</span></div>`;
      el.title = place.title || cat.label;
      return el;
    }

    function renderMarkers() {
      for (const marker of markers.values()) marker.remove();
      markers.clear();
      if (!map.loaded()) return;

      places.forEach(place => {
        if (activeFilter !== "all" && place.category !== activeFilter) return;
        const popup = new maplibregl.Popup({ offset: 28, closeButton: false })
          .setHTML(`<div class="popup-title">${(CATEGORIES[place.category] || CATEGORIES.other).emoji} ${esc(place.title)}</div><div class="popup-meta">Tap the pin for notes and directions.</div>`);
        const marker = new maplibregl.Marker({ element: markerElement(place), anchor: "bottom" })
          .setLngLat([place.lng, place.lat])
          .setPopup(popup)
          .addTo(map);
        marker.getElement().addEventListener("click", () => showPlace(place.id));
        markers.set(place.id, marker);
      });
    }

    function haversine(a, b) {
      const R = 6371000;
      const rad = d => d * Math.PI / 180;
      const dLat = rad(b.lat - a.lat);
      const dLng = rad(b.lng - a.lng);
      const q = Math.sin(dLat / 2) ** 2 + Math.cos(rad(a.lat)) * Math.cos(rad(b.lat)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(q), Math.sqrt(1 - q));
    }

    function distanceLabel(meters) {
      if (!Number.isFinite(meters)) return "Location needed";
      if (meters < 1000) return `${Math.round(meters / 10) * 10} m`;
      return `${(meters / 1609.344).toFixed(meters > 8046 ? 1 : 2)} mi`;
    }

    function walkEstimate(meters) {
      if (!Number.isFinite(meters)) return "Location needed";
      const minutes = Math.max(1, Math.round(meters / 80));
      return `about ${minutes} min`;
    }

    function currentOrigin() {
      return userLocation || null;
    }

    function showPlace(id) {
      const place = places.find(p => p.id === id);
      if (!place) return;
      const cat = CATEGORIES[place.category] || CATEGORIES.other;
      const origin = userLocation;
      const distance = origin ? haversine(origin, place) : NaN;
      const address = place.address ? `<p>${esc(place.address)}</p>` : "";
      const note = place.notes ? `<div class="place-note">${esc(place.notes)}</div>` : '<div class="place-note" style="color:var(--muted)">No notes yet.</div>';
      openSheet(`
        <div class="sheet-head"><div style="flex:1"></div><button class="close-btn" data-action="close" aria-label="Close">×</button></div>
        <div class="place-title">
          <div class="big-emoji">${cat.emoji}</div>
          <div><h2>${esc(place.title)}</h2><p>${esc(cat.label)}${place.favorite ? " · Favorite" : ""}${place.visited ? " · Visited" : ""}</p>${address}</div>
        </div>
        <div class="stats">
          <div class="stat"><strong>${distanceLabel(distance)}</strong><small>straight-line distance</small></div>
          <div class="stat"><strong>${walkEstimate(distance)}</strong><small>rough walking estimate</small></div>
        </div>
        ${note}
        <div class="actions">
          <button class="btn success" data-action="directions" data-mode="walking" data-id="${place.id}">🚶 Walk now</button>
          <button class="btn primary" data-action="plan-to-place" data-id="${place.id}">🚌 Transit plan</button>
          <button class="btn gold" data-action="share" data-id="${place.id}">↗ Share place</button>
          <button class="btn" data-action="edit" data-id="${place.id}">✏️ Edit pin</button>
        </div>
      `);
    }

    function startAdd(latlng = null, preset = null) {
      if (!latlng) {
        placementMode = true;
        pendingLatLng = null;
        closeSheet();
        showTip("Tap the map where you want the pin.", 0);
        document.getElementById("addBtn").classList.add("active");
        return;
      }
      placementMode = false;
      document.getElementById("addBtn").classList.remove("active");
      mapTip.classList.remove("show");
      pendingLatLng = { lat: latlng.lat, lng: latlng.lng };
      editingId = null;
      showEditForm({
        title: preset?.title || "",

        address: preset?.address || "",

      });

    function showEditForm(place) {
      const isEditing = Boolean(editingId);
      openSheet(`
        <div class="sheet-head"><h2>${isEditing ? "Edit pin" : "Add a place"}</h2><button class="close-btn" data-action="close" aria-label="Close">×</button></div>
        <form id="placeForm">
          <div class="field"><label for="placeTitle">Place name</label><input id="placeTitle" name="title" maxlength="80" required value="${esc(place.title)}" placeholder="Coffee shop, apartment, classroom…" /></div>
          <div class="field"><label for="placeCategory">Category</label><select id="placeCategory" name="category">${categoryOptions(place.category)}</select></div>
          <div class="field"><label for="placeAddress">Address or location details</label><input id="placeAddress" name="address" maxlength="180" value="${esc(place.address)}" placeholder="Optional" /></div>
          <div class="field"><label for="placeNotes">Personal notes</label><textarea id="placeNotes" name="notes" maxlength="1500" placeholder="Best time to go, what to order, which bus stop to use…">${esc(place.notes)}</textarea></div>
          <div class="switch-row">
            <label class="switch-card"><input type="checkbox" name="favorite" ${place.favorite ? "checked" : ""}/> ❤️ Favorite</label>
            <label class="switch-card"><input type="checkbox" name="visited" ${place.visited ? "checked" : ""}/> ✓ Visited</label>
          </div>
          <div class="actions ${isEditing ? "" : "one"}">
            ${isEditing ? `<button type="button" class="btn danger" data-action="delete" data-id="${editingId}">Delete</button>` : ""}
            <button type="submit" class="btn primary">Save pin</button>
          </div>
        </form>
      `);
      setTimeout(() => document.getElementById("placeTitle")?.focus(), 80);

    function saveForm(form) {
      const data = new FormData(form);
      const title = String(data.get("title") || "").trim();
      if (!title) return toast("Please add a place name.");
      const fields = {
        title,
        category: CATEGORIES[data.get("category")] ? data.get("category") : "other",
        address: String(data.get("address") || "").trim(),
        notes: String(data.get("notes") || "").trim(),
        favorite: data.get("favorite") === "on",
        visited: data.get("visited") === "on",
        updatedAt: new Date().toISOString()
      };

      const wasEditing = Boolean(editingId);
      if (editingId) {
        const index = places.findIndex(p => p.id === editingId);
        if (index >= 0) places[index] = { ...places[index], ...fields };
      } else {
        if (!pendingLatLng) return toast("Choose a point on the map first.");
        places.push({
          id: uid(),
          lat: pendingLatLng.lat,
          lng: pendingLatLng.lng,
          createdAt: new Date().toISOString(),
          ...fields
        });
      }
      savePlaces();
      renderMarkers();
      closeSheet();
      pendingLatLng = null;
      toast(wasEditing ? "Pin updated." : "Pin saved.");

    function deletePlace(id) {
      const place = places.find(p => p.id === id);
      if (!place) return;
      if (!confirm(`Delete “${place.title}”?`)) return;
      places = places.filter(p => p.id !== id);
      savePlaces();
      renderMarkers();
      closeSheet();
      toast("Pin deleted.");
    }

    function showPins() {
      const chips = [`<button class="chip ${activeFilter === "all" ? "active" : ""}" data-action="filter" data-filter="all">All</button>`]
        .concat(Object.entries(CATEGORIES).map(([key, cat]) => `<button class="chip ${activeFilter === key ? "active" : ""}" data-action="filter" data-filter="${key}">${cat.emoji} ${esc(cat.label)}</button>`)).join("");

        .filter(p => activeFilter === "all" || p.category === activeFilter)
        .map(p => ({ ...p, _distance: origin ? haversine(origin, p) : null }))
        .sort((a, b) => origin ? a._distance - b._distance : a.title.localeCompare(b.title));

      const list = filtered.length ? filtered.map(p => {

        return `<button class="pin-card" data-action="open-place" data-id="${p.id}">
          <span class="emoji">${cat.emoji}</span>

      openSheet(`
        <div class="sheet-head"><h2>My places</h2><button class="close-btn" data-action="close" aria-label="Close">×</button></div>
        <div class="category-strip">${chips}</div>
        <div class="pin-list">${list}</div>
      `);
    }

    function updateAccuracyCircle(lat, lng, radiusMeters) {
      if (!map.loaded()) return;
      const steps = 48;
      const coords = [];
      const earth = 6378137;
      for (let i = 0; i <= steps; i++) {
        const angle = (i / steps) * Math.PI * 2;
        const dLat = (radiusMeters / earth) * Math.sin(angle);
        const dLng = (radiusMeters / (earth * Math.cos(lat * Math.PI / 180))) * Math.cos(angle);
        coords.push([lng + dLng * 180 / Math.PI, lat + dLat * 180 / Math.PI]);
      }
      const data = { type: "Feature", geometry: { type: "Polygon", coordinates: [coords] } };
      if (map.getSource("user-accuracy")) {
        map.getSource("user-accuracy").setData(data);
      } else {
        map.addSource("user-accuracy", { type: "geojson", data });
        map.addLayer({ id: "user-accuracy-fill", type: "fill", source: "user-accuracy", paint: { "fill-color": "#1877f2", "fill-opacity": 0.08 } });
        map.addLayer({ id: "user-accuracy-line", type: "line", source: "user-accuracy", paint: { "line-color": "#1877f2", "line-width": 1 } });
      }
    }

    async function locateUser(center = true) {
      if (!navigator.geolocation) return toast("Location is not supported on this device.");
      toast("Finding your location…");
      navigator.geolocation.getCurrentPosition(position => {
        const { latitude, longitude, accuracy } = position.coords;
        userLocation = { lat: latitude, lng: longitude };
        if (userMarker) userMarker.remove();
        const userEl = document.createElement("div");
        userEl.innerHTML = '<div class="user-dot"></div>';
        userEl.title = "Your location";
        userMarker = new maplibregl.Marker({ element: userEl, anchor: "center" })
          .setLngLat([longitude, latitude])
          .addTo(map);
        updateAccuracyCircle(latitude, longitude, accuracy);
        if (center) setMapView(latitude, longitude, Math.max(map.getZoom(), 16));
        toast(`Location found${accuracy ? ` · about ${Math.round(accuracy)} m accuracy` : ""}.`);
      }, error => {
        const message = error.code === 1 ? "Location permission was denied." : "Could not find your location.";
        toast(message);
      }, { enableHighAccuracy: true, timeout: 12000, maximumAge: 20000 });
    }

    function goHome() {
      const home = places.find(p => p.category === "home");
      if (!home) {
        toast("Add an apartment or home pin first.");
        activeFilter = "home";
        showPins();
        return;
      }
      setMapView(home.lat, home.lng, 17);
      const marker = markers.get(home.id);
      marker?.togglePopup();
      showPlace(home.id);
    }

    function openDirections(place, mode) {
      const destination = `${place.lat},${place.lng}`;
      const origin = userLocation ? `&origin=${userLocation.lat},${userLocation.lng}` : "";
      const url = `https://www.google.com/maps/dir/?api=1${origin}&destination=${encodeURIComponent(destination)}&travelmode=${mode}&dir_action=navigate`;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    async function sharePlace(place) {
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${place.lat},${place.lng}`;
      const text = `${place.title}${place.address ? `\n${place.address}` : ""}${place.notes ? `\n${place.notes}` : ""}`;
      try {
        if (navigator.share) await navigator.share({ title: place.title, text, url: mapsUrl });
        else {
          await navigator.clipboard.writeText(`${text}\n${mapsUrl}`);
          toast("Place copied to the clipboard.");
        }
      } catch (error) {
        if (error?.name !== "AbortError") toast("Could not share this place.");
      }
    }

    function showSearch() {
      openSheet(`
        <div class="sheet-head"><h2>Search results</h2><button class="close-btn" data-action="close" aria-label="Close">×</button></div>
        <div id="searchResults"><div class="empty"><span class="big">⌕</span>Searching Seattle…</div></div>
      `);
    }

    async function searchPlaces(query) {
      const q = query.trim();
      if (q.length < 2) return toast("Type at least two letters.");
      const now = Date.now();
      if (now - lastSearchAt < 1100) return toast("Please wait a moment before searching again.");
      lastSearchAt = now;
      showSearch();

      const cache = loadJSON(SEARCH_CACHE_KEY, {});
      const cacheKey = q.toLowerCase();
      let results = cache[cacheKey]?.results;
      const fresh = cache[cacheKey] && now - cache[cacheKey].savedAt < 7 * 24 * 60 * 60 * 1000;

      try {
        if (!fresh) {
          const params = new URLSearchParams({
            format: "jsonv2",
            q: `${q}, Seattle, Washington`,
            limit: "8",
            addressdetails: "1",
            bounded: "1",
            viewbox: SEATTLE_VIEWBOX
          });
          const response = await fetch(`https://nominatim.openstreetmap.org/search?${params.toString()}`, {
            headers: { "Accept": "application/json" }
          });
          if (!response.ok) throw new Error("Search unavailable");
          results = await response.json();
          cache[cacheKey] = { savedAt: now, results };
          const limitedCache = Object.fromEntries(Object.entries(cache).slice(-30));
          localStorage.setItem(SEARCH_CACHE_KEY, JSON.stringify(limitedCache));
        }
        renderSearchResults(results || []);
      } catch (_) {
        const el = document.getElementById("searchResults");
        if (el) el.innerHTML = `<div class="empty"><span class="big">⚠️</span>Search could not load. Check the internet connection, or use Add and tap the map.</div>`;
      }
    }

    function guessCategory(result) {
      const type = `${result.type || ""} ${result.category || ""} ${result.display_name || ""}`.toLowerCase();
      if (/university|college|school|campus/.test(type)) return "uw";
      if (/supermarket|grocery|market/.test(type)) return "grocery";
      if (/cafe|coffee|restaurant|fast_food|food/.test(type)) return "food";
      if (/station|bus_stop|platform|transit/.test(type)) return "transit";
      if (/library|study/.test(type)) return "study";
      if (/hospital|clinic|pharmacy|doctor/.test(type)) return "health";
      if (/park|museum|theatre|cinema|attraction/.test(type)) return "fun";
      return "other";
    }

    function renderSearchResults(results) {
      const el = document.getElementById("searchResults");
      if (!el) return;
      if (!results.length) {
        el.innerHTML = `<div class="empty"><span class="big">🗺️</span>No Seattle results found. Try a business name plus neighborhood.</div>`;
        return;
      }
      el.innerHTML = `<div class="search-results">${results.map((r, index) => {
        const title = r.name || String(r.display_name || "Place").split(",")[0];
        return `<button class="search-result" data-action="select-search" data-index="${index}"><strong>${esc(title)}</strong><small>${esc(r.display_name)}</small></button>`;
      }).join("")}</div>`;
      el.dataset.results = JSON.stringify(results);
    }

    function selectSearch(index) {
      const holder = document.getElementById("searchResults");
      if (!holder) return;
      const results = JSON.parse(holder.dataset.results || "[]");
      const result = results[index];
      if (!result) return;
      selectedSearchResult = result;
      const lat = Number(result.lat);
      const lng = Number(result.lon);
      const title = result.name || String(result.display_name || "Place").split(",")[0];
      closeSheet();
      setMapView(lat, lng, 17);
      startAdd({ lat, lng }, {
        title,
        address: result.display_name || "",
        category: guessCategory(result)
      });
    }

    async function toggleTransit() {
      settings.transitVisible = !settings.transitVisible;
      saveSettings();
        if (!settings.transitVisible) {
        transitMarkers.forEach(marker => marker.remove());
        transitMarkers = [];
        toast("Transit stops hidden.");
        return;
      }
      await loadTransitStops();
    }

    async function loadTransitStops() {
      const center = map.getCenter();
      if (map.getZoom() < 13) map.setZoom(13);
      transitMarkers.forEach(marker => marker.remove());
      transitMarkers = [];
      toast("Loading nearby transit stops…");

      const bounds = map.getBounds();
      const padLat = Math.max((bounds.getNorth() - bounds.getSouth()) * 0.45, 0.018);
      const padLng = Math.max((bounds.getEast() - bounds.getWest()) * 0.45, 0.025);
      const south = Math.max(47.48, bounds.getSouth() - padLat);
      const west = Math.max(-122.47, bounds.getWest() - padLng);
      const north = Math.min(47.75, bounds.getNorth() + padLat);
      const east = Math.min(-122.20, bounds.getEast() + padLng);

      const query = `[out:json][timeout:22];(
        nwr(${south},${west},${north},${east})["highway"="bus_stop"];
        nwr(${south},${west},${north},${east})["public_transport"~"platform|station|stop_position"];
        nwr(${south},${west},${north},${east})["railway"~"station|halt|tram_stop|subway_entrance"];
      );out center tags;`;

      const endpoints = [
        "https://overpass-api.de/api/interpreter",
        "https://overpass.kumi.systems/api/interpreter",
        "https://overpass.nchc.org.tw/api/interpreter"
      ];

      let elements = null;
      for (const endpoint of endpoints) {
        try {
          const url = `${endpoint}?data=${encodeURIComponent(query)}`;
          const response = await fetch(url, { headers: { "Accept": "application/json" } });
          if (!response.ok) continue;
          const data = await response.json();
          if (Array.isArray(data.elements)) { elements = data.elements; break; }
        } catch (_) {}
      }

      const candidates = Array.isArray(elements) ? elements.map(item => ({
        name: item.tags?.name || item.tags?.ref || item.tags?.local_ref || "Transit stop",
        lat: Number(item.lat ?? item.center?.lat),
        lng: Number(item.lon ?? item.center?.lon),
        rail: Boolean(item.tags?.railway || item.tags?.station === "subway" || item.tags?.train === "yes" || item.tags?.light_rail === "yes")
      })) : [];

      const nearUW = Math.abs(center.lat - UW.lat) < 0.08 && Math.abs(center.lng - UW.lng) < 0.10;
      if (nearUW) candidates.push(...UW_TRANSIT_FALLBACK);

      const seen = new Set();
      let count = 0;
      for (const item of candidates) {
        const lat = Number(item.lat);
        const lng = Number(item.lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;
        if (lat < south || lat > north || lng < west || lng > east) continue;
        const name = item.name || "Transit stop";
        const key = `${name.toLowerCase()}|${lat.toFixed(4)}|${lng.toFixed(4)}`;
        if (seen.has(key)) continue;
        seen.add(key);
        const isRail = Boolean(item.rail);
        const el = document.createElement("div");
        el.className = "transit-marker";
        el.innerHTML = `<div class="transit-bubble">${isRail ? "🚉" : "🚌"}</div>`;
        el.title = name;
        const marker = new maplibregl.Marker({ element: el, anchor: "center" })
          .setLngLat([lng, lat])
          .setPopup(new maplibregl.Popup({ offset: 18, closeButton: false }).setHTML(`<div class="popup-title">${isRail ? "🚉" : "🚌"} ${esc(name)}</div><div class="popup-meta">Tap for directions or save this transit location.</div>`))
          .addTo(map);
        el.addEventListener("click", () => {
          setTimeout(() => {
            openSheet(`
              <div class="sheet-head"><h2>${isRail ? "Rail station" : "Transit stop"}</h2><button class="close-btn" data-action="close">×</button></div>
              <div class="place-title"><div class="big-emoji">${isRail ? "🚉" : "🚌"}</div><div><h2>${esc(name)}</h2><p>Nearby transit location</p></div></div>
              <div class="actions">
                <button class="btn primary" data-action="transit-to-stop" data-lat="${lat}" data-lng="${lng}">🚌 Directions here</button>
                <button class="btn gold" data-action="save-transit-stop" data-lat="${lat}" data-lng="${lng}" data-name="${esc(name)}">📍 Save stop</button>
              </div>
            `);
          }, 80);
        });
        transitMarkers.push(marker);
        count++;
        if (count >= 180) break;
      }

      if (count) {
        toast(`${count} nearby transit locations loaded.`);
      } else {
        settings.transitVisible = false;
        saveSettings();
        document.getElementById("transitBtn")?.classList.remove("active");
        toast("Transit data could not load. Try the UW button, then Transit again.");
      }
    }


    const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    function placeOptions(selected="") {
      return `<option value="">Choose a saved place</option>` + places.map(p => `<option value="${p.id}" ${p.id===selected?"selected":""}>${(CATEGORIES[p.category]||CATEGORIES.other).emoji} ${esc(p.title)}</option>`).join("");
    }

    function eventDaysLabel(item) {
      const days = Array.isArray(item.days) ? item.days : [];
      if (days.length === 7) return "Every day";
      return days.map(d => DAYS[d]).join(", ") || "One-time / unscheduled";
    }

    function todayEvents() {
      const day = new Date().getDay();
      const now = new Date();
      const mins = now.getHours()*60 + now.getMinutes();
      return schedule.filter(e => (e.days||[]).includes(day)).map(e => {
        const [h,m] = String(e.time||"00:00").split(":").map(Number);
        return {...e, _mins:h*60+m};
      }).filter(e => e._mins >= mins-15).sort((a,b)=>a._mins-b._mins);
    }

    function formatTime(value) {
      if (!value) return "";
      const [h,m]=value.split(":").map(Number);
      return new Date(2000,0,1,h,m).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
    }

    function nextDestinationHTML() {
      const next=todayEvents()[0];
      if (!next) return `<div class="next-card"><h3>Next destination</h3><p>No more scheduled places today.</p><button class="btn" data-action="add-event">＋ Add schedule item</button></div>`;
      const place=places.find(p=>p.id===next.placeId);
      return `<div class="next-card"><h3>Next destination</h3><p><strong>${esc(next.title)}</strong> · ${formatTime(next.time)}</p><p>${place?`${(CATEGORIES[place.category]||CATEGORIES.other).emoji} ${esc(place.title)}`:"Choose a saved location"}</p>${place?`<button class="btn" data-action="plan-event" data-id="${next.id}">Plan this trip</button>`:""}</div>`;
    }

    function showDashboard() {
      openSheet(`
        <div class="sheet-head"><h2>MyMap</h2><button class="close-btn" data-action="close">×</button></div>
        ${nextDestinationHTML()}
        <div class="quick-grid">
          <button class="quick-card" data-action="go-category" data-category="home"><span>🏠</span>Home</button>
          <button class="quick-card" data-action="show-school"><span>🎓</span>School buildings</button>
          <button class="quick-card" data-action="go-category" data-category="work"><span>💼</span>Work</button>
          <button class="quick-card" data-action="show-schedule"><span>📅</span>Schedule</button>
          <button class="quick-card" data-action="show-neighborhoods"><span>🗺️</span>Neighborhoods</button>
          <button class="quick-card" data-action="toggle-transit"><span>🚉</span>Nearby transit</button>
          <button class="quick-card" data-action="show-meet"><span>🤝</span>Meet Me</button>
          <button class="quick-card" data-action="locate"><span>◎</span>My location</button>
        </div>
      `);
    }

    function showSchedule() {
      const items=[...schedule].sort((a,b)=>(a.time||"").localeCompare(b.time||"")).map(e=>{
        const place=places.find(p=>p.id===e.placeId);
        return `<div class="event-card"><h3>${esc(e.title)}</h3><p>⏰ ${formatTime(e.time)} · ${esc(eventDaysLabel(e))}</p><p>📍 ${place?esc(place.title):"No location selected"}</p><div class="event-actions"><button class="btn primary" data-action="plan-event" data-id="${e.id}">Plan trip</button><button class="btn" data-action="edit-event" data-id="${e.id}">Edit</button></div></div>`;
      }).join("") || `<div class="empty"><span class="big">📅</span>No schedule items yet. Add classes, work shifts, appointments, or regular trips.</div>`;
      openSheet(`<div class="sheet-head"><h2>Schedule</h2><button class="close-btn" data-action="close">×</button></div>${nextDestinationHTML()}<button class="btn gold" data-action="add-event">＋ Add class, work, or event</button>${items}`);
    }

    function showEventForm(item={}) {
      const selectedDays=Array.isArray(item.days)?item.days:[];
      const dayBoxes=DAYS.map((d,i)=>`<label class="day-check"><input type="checkbox" name="day" value="${i}" ${selectedDays.includes(i)?"checked":""}>${d}</label>`).join("");
      openSheet(`<div class="sheet-head"><h2>${item.id?"Edit":"Add"} schedule item</h2><button class="close-btn" data-action="close">×</button></div>
      <form id="eventForm" data-id="${item.id||""}">
        <div class="field"><label>Name</label><input name="title" required maxlength="80" value="${esc(item.title||"")}" placeholder="Biology 101, work, appointment…"></div>
        <div class="field"><label>Saved destination</label><select name="placeId" required>${placeOptions(item.placeId||"")}</select><small>Save each UW building as its own place, then connect the class to that building.</small></div>
        <div class="field"><label>Start / arrival time</label><input type="time" name="time" required value="${esc(item.time||"")}"></div>
        <div class="field"><label>Days</label><div class="day-grid">${dayBoxes}</div></div>
        <div class="field"><label>Notes</label><textarea name="notes" maxlength="500">${esc(item.notes||"")}</textarea></div>
        <div class="actions">${item.id?`<button type="button" class="btn danger" data-action="delete-event" data-id="${item.id}">Delete</button>`:""}<button class="btn primary" type="submit">Save schedule</button></div>
      </form>`);
    }

    function saveEvent(form) {
      const data=new FormData(form); const id=form.dataset.id||uid();
      const item={id,title:String(data.get("title")||"").trim(),placeId:String(data.get("placeId")||""),time:String(data.get("time")||""),days:data.getAll("day").map(Number),notes:String(data.get("notes")||"").trim()};
      if(!item.title||!item.placeId||!item.time) return toast("Add a name, destination, and time.");
      const i=schedule.findIndex(e=>e.id===id); if(i>=0)schedule[i]=item; else schedule.push(item); saveSchedule(); showSchedule(); toast("Schedule saved.");
    }

    function showTripPlanner(destinationId="", eventId="") {
      const event=schedule.find(e=>e.id===eventId); if(event&&!destinationId)destinationId=event.placeId;
      const home=places.find(p=>p.category==="home");
      openSheet(`<div class="sheet-head"><h2>Plan a trip</h2><button class="close-btn" data-action="close">×</button></div>
      <form id="tripForm">
        <div class="field"><label>Starting from</label><select name="origin"><option value="current">◎ Current location</option>${placeOptions(home?.id||"")}</select></div>
        <div class="field"><label>Going to</label><select name="destination" required>${placeOptions(destinationId)}</select></div>
        <div class="field"><label>When</label><select name="timing" id="tripTiming"><option value="now">Leave now</option><option value="arrive">Arrive by</option></select></div>
        <div class="field" id="arrivalField" hidden><label>Arrival time</label><input type="time" name="arrival" value="${esc(event?.time||"")}"><small>MyMap will carry the route into Google Maps. In Google Maps, select “Arrive by” and confirm this time for the live itinerary.</small></div>
        <div class="actions"><button class="btn success" type="button" data-action="open-walk-plan">🚶 Walk</button><button class="btn primary" type="submit">🚌 Public transit</button></div>
      </form>
      <p class="fine-print">Only the live directions open in Google Maps. Your saved places, notes, schedule, and map stay in MyMap.</p>`);
      setTimeout(()=>{const t=document.getElementById("tripTiming"),f=document.getElementById("arrivalField"); if(t)t.onchange=()=>f.hidden=t.value!=="arrive"; if(event?.time&&t){t.value="arrive";f.hidden=false;}},50);
    }

    function launchTrip(form, mode) {
      const data=new FormData(form); const dest=places.find(p=>p.id===data.get("destination")); if(!dest)return toast("Choose a destination.");
      let origin=""; const ov=data.get("origin");
      if(ov==="current") { if(userLocation) origin=`&origin=${userLocation.lat},${userLocation.lng}`; }
      else { const op=places.find(p=>p.id===ov); if(op)origin=`&origin=${op.lat},${op.lng}`; }
      const url=`https://www.google.com/maps/dir/?api=1${origin}&destination=${dest.lat},${dest.lng}&travelmode=${mode}&dir_action=navigate`;
      if(data.get("timing")==="arrive") toast(`Google Maps will open. Choose Arrive by ${formatTime(String(data.get("arrival")||""))}.`);
      window.open(url,"_blank","noopener,noreferrer");
    }

    function showNeighborhoods() {
      const buttons=Object.entries(NEIGHBORHOODS).map(([k,n])=>`<button class="menu-item" data-action="jump-neighborhood" data-key="${k}">${k==="uw"?"🎓":"📍"} ${esc(n.label)}</button>`).join("");
      openSheet(`<div class="sheet-head"><h2>Seattle neighborhoods</h2><button class="close-btn" data-action="close">×</button></div><div class="menu-list">${buttons}</div>`);
    }

    function showMeetMe() {
      openSheet(`<div class="sheet-head"><h2>Meet Me</h2><button class="close-btn" data-action="close">×</button></div>
      <p class="fine-print">Choose two saved starting places. MyMap will zoom to the middle area so you can search for coffee, food, parks, or another meeting place nearby.</p>
      <form id="meetForm"><div class="field"><label>Person 1 starts at</label><select name="a" required>${placeOptions()}</select></div><div class="field"><label>Person 2 starts at</label><select name="b" required>${placeOptions()}</select></div><button class="btn primary" type="submit">Show meeting area</button></form>`);
    }

    function runMeetMe(form) {
      const d=new FormData(form),a=places.find(p=>p.id===d.get("a")),b=places.find(p=>p.id===d.get("b")); if(!a||!b)return toast("Choose two saved places.");
      closeSheet(); setMapView((a.lat+b.lat)/2,(a.lng+b.lng)/2,14.5,true); document.getElementById("searchInput").value="coffee"; toast("Showing the middle area. Search for coffee, food, parks, or another place.");
    }

    function goCategory(category) {
      const matches=places.filter(p=>p.category===category || (category==="school" && p.category==="uw"));
      if(!matches.length){activeFilter=category;showPins();toast(`Add a ${category} place first.`);return;}
      if(matches.length===1){closeSheet();setMapView(matches[0].lat,matches[0].lng,16,true);showPlace(matches[0].id);} else {activeFilter=category==="school"?"all":category;showPins();}
    }

    function showMenu() {
      showDashboard();
    }

    function showHelp() {
      openSheet(`
        <div class="sheet-head"><h2>How to use it</h2><button class="close-btn" data-action="close">×</button></div>
        <div class="place-note"><strong>Add a pin:</strong> Press the purple + button, then tap the exact place on the map. You can also search for a place and select a result.</div>
        <div class="place-note"><strong>Walking and transit:</strong> Open any saved pin and press Walk or Transit. Live directions open in Google Maps using your current location when available.</div>
        <div class="place-note"><strong>Transit stops:</strong> Press Transit to load nearby bus stops and rail stations. Use a neighborhood button first, then press Transit to load that area.</div>
        <div class="place-note"><strong>Important places:</strong> Press + to save your home, work location, school, and each campus building you regularly visit.</div>
        <div class="place-note"><strong>Backup:</strong> Use the MM menu to download a backup file. Restore that file on another phone or browser.</div>
      `);
    }

    function exportData() {
      const data = {
        app: "MyMap",
        version: APP_VERSION,
        exportedAt: new Date().toISOString(),
        places,
        schedule
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `mymap-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
      toast("Backup downloaded.");
    }

    async function importData(file) {
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (!Array.isArray(data.places)) throw new Error("Invalid backup");
        const cleaned = data.places.filter(p => p && Number.isFinite(Number(p.lat)) && Number.isFinite(Number(p.lng)) && p.title).map(p => ({
          id: String(p.id || uid()),
          title: String(p.title).slice(0,80),
          category: CATEGORIES[p.category] ? p.category : "other",
          address: String(p.address || "").slice(0,180),
          notes: String(p.notes || "").slice(0,1500),
          favorite: Boolean(p.favorite),
          visited: Boolean(p.visited),
          lat: Number(p.lat),
          lng: Number(p.lng),
          createdAt: p.createdAt || new Date().toISOString(),
          updatedAt: p.updatedAt || new Date().toISOString()
        }));
        if (!confirm(`Restore ${cleaned.length} pins? This will replace the pins currently on this device.`)) return;
        places = cleaned;
        schedule = Array.isArray(data.schedule) ? data.schedule : schedule;
        savePlaces();
        saveSchedule();
        renderMarkers();
        closeSheet();
        toast(`${places.length} pins restored.`);
      } catch (_) {
        toast("That file is not a valid MyMap backup.");
      } finally {
        document.getElementById("importInput").value = "";
      }
    }

    map.on("click", event => {
      if (placementMode) startAdd({ lat: event.lngLat.lat, lng: event.lngLat.lng });
    });

    map.on("contextmenu", event => {
      startAdd({ lat: event.lngLat.lat, lng: event.lngLat.lng });
    });

    document.getElementById("searchForm").addEventListener("submit", event => {
      event.preventDefault();
      searchPlaces(document.getElementById("searchInput").value);
    });
    document.getElementById("addBtn").addEventListener("click", () => {
      if (placementMode) {
        placementMode = false;
        pendingLatLng = null;
        mapTip.classList.remove("show");
        document.getElementById("addBtn").classList.remove("active");
        toast("Pin placement canceled.");
      } else startAdd();
    });
    document.getElementById("pinsBtn").addEventListener("click", showPins);
    document.getElementById("scheduleBtn").addEventListener("click", showSchedule);
    document.getElementById("planBtn").addEventListener("click", () => showTripPlanner());
    document.getElementById("moreBtn").addEventListener("click", showDashboard);
    document.getElementById("menuBtn").addEventListener("click", showDashboard);
    document.getElementById("jumpStrip").addEventListener("click", event => {
      const button = event.target.closest("[data-jump]");
      if (!button) return;
      const place = NEIGHBORHOODS[button.dataset.jump];
      if (!place) return;
      setMapView(place.lat, place.lng, place.zoom, true);
      toast(`Showing ${place.label}.`);
      if (settings.transitVisible) setTimeout(loadTransitStops, 650);
    });
    backdrop.addEventListener("click", closeSheet);
    document.getElementById("importInput").addEventListener("change", event => importData(event.target.files?.[0]));

    sheet.addEventListener("submit", event => {
      if (event.target.id === "placeForm") { event.preventDefault(); saveForm(event.target); }
      if (event.target.id === "eventForm") { event.preventDefault(); saveEvent(event.target); }
      if (event.target.id === "tripForm") { event.preventDefault(); launchTrip(event.target, "transit"); }
      if (event.target.id === "meetForm") { event.preventDefault(); runMeetMe(event.target); }
    });

    sheet.addEventListener("click", event => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const action = button.dataset.action;
      const id = button.dataset.id;

      if (action === "close") closeSheet();
      if (action === "open-place") { closeSheet(); const p = places.find(x => x.id === id); if (p) { setMapView(p.lat, p.lng, Math.max(map.getZoom(), 16)); showPlace(id); } }
      if (action === "edit") { const p = places.find(x => x.id === id); if (p) { editingId = id; pendingLatLng = { lat: p.lat, lng: p.lng }; showEditForm(p); } }
      if (action === "delete") deletePlace(id);
      if (action === "directions") { const p = places.find(x => x.id === id); if (p) openDirections(p, button.dataset.mode); }
      if (action === "share") { const p = places.find(x => x.id === id); if (p) sharePlace(p); }
      if (action === "filter") { activeFilter = button.dataset.filter || "all"; renderMarkers(); showPins(); }
      if (action === "select-search") selectSearch(Number(button.dataset.index));
      if (action === "export") exportData();
      if (action === "import") document.getElementById("importInput").click();
      if (action === "center-uw") { closeSheet(); setMapView(UW.lat, UW.lng, 15); }
      if (action === "help") showHelp();
      if (action === "transit-to-stop") {
        const p = { lat: Number(button.dataset.lat), lng: Number(button.dataset.lng) };
        openDirections(p, "transit");
      }
      if (action === "save-transit-stop") {
        const lat = Number(button.dataset.lat), lng = Number(button.dataset.lng);
        closeSheet();
        startAdd({ lat, lng }, { title: button.dataset.name || "Transit stop", category: "transit", address: "" });
      }
      if (action === "show-schedule") showSchedule();
      if (action === "add-event") showEventForm();
      if (action === "edit-event") { const e=schedule.find(x=>x.id===id); if(e)showEventForm(e); }
      if (action === "delete-event") { if(confirm("Delete this schedule item?")){ schedule=schedule.filter(x=>x.id!==id); saveSchedule(); showSchedule(); } }
      if (action === "plan-event") showTripPlanner("", id);
      if (action === "plan-to-place") showTripPlanner(id);
      if (action === "open-walk-plan") { const form=document.getElementById("tripForm"); if(form)launchTrip(form,"walking"); }
      if (action === "show-neighborhoods") showNeighborhoods();
      if (action === "jump-neighborhood") { const n=NEIGHBORHOODS[button.dataset.key]; if(n){closeSheet();setMapView(n.lat,n.lng,n.zoom,true);toast(`Showing ${n.label}.`);} }
      if (action === "show-meet") showMeetMe();
      if (action === "go-category") goCategory(button.dataset.category);
      if (action === "show-school") goCategory("school");
      if (action === "toggle-transit") { closeSheet(); toggleTransit(); }
      if (action === "locate") { closeSheet(); locateUser(true); }
    });

    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }

    setTimeout(() => {
      if (!settings.welcomed) {
        settings.welcomed = true; saveSettings();
        openSheet(`<div class="sheet-head"><h2>Welcome to MyMap</h2><button class="close-btn" data-action="close">×</button></div><div class="place-note">Press the purple <strong>+</strong> button to add your home location, work location, school, and each campus building or destination you regularly visit.</div><div class="place-note">Use <strong>Schedule</strong> for classes, work shifts, appointments, and regular trips. Use <strong>Plan</strong> for Leave Now or Arrive By transit directions.</div><button class="btn primary" data-action="close">Start using MyMap</button>`);
      } else if (!places.length) showTip("Press + to add your home, work, school, campus buildings, and favorite places.", 4800);
    }, 900);
  })();
  </script>
</body>
</html>
